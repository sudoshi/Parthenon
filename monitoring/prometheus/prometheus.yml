global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Extract the full 64-hex container ID from the cgroup path and store it as
      # a `container_id` label.  This label is not used by the Parthenon dashboards
      # (which filter by the Docker-assigned `name` label) but is available for
      # ad-hoc PromQL queries.
      - source_labels: [id]
        regex: '/system\.slice/docker-([0-9a-f]{64})\.scope'
        target_label: container_id
        replacement: '${1}'

  - job_name: node-exporter
    static_configs:
      - targets: ['host.docker.internal:9100']

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
