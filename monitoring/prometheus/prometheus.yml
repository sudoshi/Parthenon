global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Derive a short "name" label from the Docker cgroup id path.
      # Format: /system.slice/docker-<64hex>.scope  → name = container_id[:12]
      # This allows dashboard queries to filter docker containers by id prefix.
      - source_labels: [id]
        regex: '/system\.slice/docker-([0-9a-f]{64})\.scope'
        target_label: container_id
        replacement: '${1}'

  - job_name: node-exporter
    static_configs:
      - targets: ['host.docker.internal:9100']
