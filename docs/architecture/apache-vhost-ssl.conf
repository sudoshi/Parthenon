<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName parthenon.acumenus.net

    # --- SSL ---
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/parthenon.acumenus.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/parthenon.acumenus.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # --- Static frontend (Vite production build) ---
    DocumentRoot /home/smudoshi/Github/Parthenon/frontend/dist

    <Directory /home/smudoshi/Github/Parthenon/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA fallback: serve index.html for all non-file routes
        FallbackResource /index.html
    </Directory>

    # --- Reverse proxy: API routes -> Docker nginx -> PHP-FPM ---
    ProxyPreserveHost On

    LimitRequestBody 5368709120
    ProxyTimeout 600

    # Docusaurus docs -> Docker nginx
    RedirectMatch 301 ^/docs$ /docs/
    ProxyPass /docs/ http://127.0.0.1:8082/docs/
    ProxyPassReverse /docs/ http://127.0.0.1:8082/docs/
    # Bare /api redirect to Scramble API docs
    RedirectMatch 301 ^/api$ /docs/api

    ProxyPass /api/ http://127.0.0.1:8082/api/
    ProxyPassReverse /api/ http://127.0.0.1:8082/api/

    ProxyPass /sanctum http://127.0.0.1:8082/sanctum
    ProxyPassReverse /sanctum http://127.0.0.1:8082/sanctum

    # Horizon dashboard
    ProxyPass /horizon http://127.0.0.1:8082/horizon
    ProxyPassReverse /horizon http://127.0.0.1:8082/horizon

    # Grafana metrics dashboard                                                                                                                    
    ProxyPass /grafana/api/live/ws ws://127.0.0.1:8082/grafana/api/live/ws
    ProxyPassReverse /grafana/api/live/ws ws://127.0.0.1:8082/grafana/api/live/ws                                                                  
    ProxyPass /grafana/ http://127.0.0.1:8082/grafana/                                                                                           
    ProxyPassReverse /grafana/ http://127.0.0.1:8082/grafana/

    # OHIF Viewer (static files served by Docker nginx)
    ProxyPass /ohif/ http://127.0.0.1:8082/ohif/
    ProxyPassReverse /ohif/ http://127.0.0.1:8082/ohif/

    # Imaging routes are still served by Apache's SPA DocumentRoot, but the
    # parent page must be cross-origin isolated so embedded OHIF volume
    # viewports can use SharedArrayBuffer-backed MPR / 3D rendering.
    <LocationMatch "^/imaging(?:/.*)?$">
        Header always set Cross-Origin-Opener-Policy "same-origin"
        Header always set Cross-Origin-Embedder-Policy "require-corp"
    </LocationMatch>

    # Jupyter workbench
    ProxyPass /jupyter/ http://127.0.0.1:8082/jupyter/
    ProxyPassReverse /jupyter/ http://127.0.0.1:8082/jupyter/

    # Orthanc PACS (DICOMweb proxy)
    ProxyPass /orthanc/ http://127.0.0.1:8082/orthanc/
    ProxyPassReverse /orthanc/ http://127.0.0.1:8082/orthanc/

    # --- Security headers ---
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"

    # --- Logging ---
    ErrorLog ${APACHE_LOG_DIR}/parthenon-error.log
    CustomLog ${APACHE_LOG_DIR}/parthenon-access.log combined
</VirtualHost>
</IfModule>
