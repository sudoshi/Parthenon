community_variant_browser:
  endpoint: /flows/community-variant-browser
  description: Explore cohort-scoped genomic variants through a Parthenon workbench generated from the Community Workbench SDK.
  mcp_tools:
    - community_variant_browser_catalog
  input:
    - source_key
    - payload
  output:
    - summary
    - panels
    - artifacts
  validation:
    - registration gated by COMMUNITY_VARIANT_BROWSER_ENABLED
    - writes require explicit confirmation before execution tools are added
  ui_hints:
    title: Community Variant Browser
    summary: Explore cohort-scoped genomic variants through a Parthenon workbench generated from the Community Workbench SDK.
    accent: slate
    repository: null
    workspace: genomics-workbench
