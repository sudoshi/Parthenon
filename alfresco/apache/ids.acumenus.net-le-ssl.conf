<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ids.acumenus.net

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Ssl "on"

    ProxyPass / http://127.0.0.1:8081/
    ProxyPassReverse / http://127.0.0.1:8081/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:8081/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/ids_error.log
    CustomLog ${APACHE_LOG_DIR}/ids_access.log combined

    SSLCertificateFile /etc/letsencrypt/live/ids.acumenus.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/ids.acumenus.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
