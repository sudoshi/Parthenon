services:
  alfresco:
    container_name: alfresco
    image: docker.io/alfresco/alfresco-content-repository-community:26.1.0
    restart: unless-stopped
    mem_limit: 1900m
    environment:
      DOMAIN: ${DOMAIN:-acumenus.net}
      JAVA_TOOL_OPTIONS: >-
        -Dencryption.keystore.type=JCEKS
        -Dencryption.cipherAlgorithm=DESede/CBC/PKCS5Padding
        -Dencryption.keyAlgorithm=DESede
        -Dencryption.keystore.location=/usr/local/tomcat/shared/classes/alfresco/extension/keystore/keystore
        -Dmetadata-keystore.password=mp6yc0UD9e
        -Dmetadata-keystore.aliases=metadata
        -Dmetadata-keystore.metadata.password=oKIWzVdEdA
        -Dmetadata-keystore.metadata.algorithm=DESede
      JAVA_OPTS: >-
        -Ddb.driver=org.postgresql.Driver
        -Ddb.username=alfresco
        -Ddb.password=${ALFRESCO_DB_PASSWORD:-alfresco}
        -Ddb.url=jdbc:postgresql://alfresco-postgres:5432/alfresco
        -Dsolr.host=alfresco-solr6
        -Dsolr.port=8983
        -Dsolr.http.connection.timeout=1000
        -Dsolr.secureComms=secret
        -Dsolr.sharedSecret=${ALFRESCO_SOLR_SHARED_SECRET:-secret}
        -Dsolr.base.url=/solr
        -Dindex.subsystem.name=solr6
        -Dshare.host=docs.${DOMAIN:-acumenus.net}
        -Dshare.port=443
        -Dalfresco.host=docs.${DOMAIN:-acumenus.net}
        -Dalfresco.port=443
        -Dcsrf.filter.enabled=false
        -Daos.baseUrlOverwrite=https://docs.${DOMAIN:-acumenus.net}/alfresco/aos
        -Dmessaging.broker.url="failover:(nio://alfresco-activemq:61616)?timeout=3000&jms.useCompression=true"
        -Dmessaging.broker.username=${ALFRESCO_AMQ_USER:-admin}
        -Dmessaging.broker.password=${ALFRESCO_AMQ_PASSWORD:-admin}
        -Ddeployment.method=DOCKER_COMPOSE
        -DlocalTransform.core-aio.url=http://alfresco-transform-core-aio:8090/
        -XX:MinRAMPercentage=50
        -XX:MaxRAMPercentage=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/alfresco/api/-default-/public/alfresco/versions/1/probes/-ready-"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 1m
    volumes:
      - alfresco_repository_data:/usr/local/tomcat/alf_data
    depends_on:
      alfresco-postgres:
        condition: service_healthy
      alfresco-solr6:
        condition: service_started
      alfresco-activemq:
        condition: service_healthy
      alfresco-transform-core-aio:
        condition: service_started
    ports:
      - "127.0.0.1:18081:8080"
    networks:
      - acumenus

  alfresco-transform-core-aio:
    container_name: alfresco-transform-core-aio
    image: alfresco/alfresco-transform-core-aio:5.4.0
    restart: unless-stopped
    mem_limit: 1536m
    environment:
      JAVA_OPTS: >-
        -XX:MinRAMPercentage=50
        -XX:MaxRAMPercentage=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/ready"]
      interval: 20s
      timeout: 2s
      retries: 3
      start_period: 10s
    depends_on:
      alfresco-activemq:
        condition: service_healthy
    ports:
      - "127.0.0.1:18090:8090"
    networks:
      - acumenus

  alfresco-share:
    container_name: alfresco-share
    image: docker.io/alfresco/alfresco-share:26.1.0
    restart: unless-stopped
    mem_limit: 4g
    environment:
      DOMAIN: ${DOMAIN:-acumenus.net}
      CSRF_FILTER_ORIGIN: https://docs.${DOMAIN:-acumenus.net}
      CSRF_FILTER_REFERER: https://docs.${DOMAIN:-acumenus.net}/share/.*
      REPO_HOST: "alfresco"
      REPO_PORT: "8080"
      JAVA_OPTS: >-
        -XX:MinRAMPercentage=50
        -XX:MaxRAMPercentage=80
        -Dalfresco.host=docs.${DOMAIN:-acumenus.net}
        -Dalfresco.port=443
        -Dalfresco.context=alfresco
        -Dalfresco.protocol=https
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/share"]
      interval: 20s
      timeout: 2s
      retries: 3
      start_period: 15s
    depends_on:
      alfresco:
        condition: service_healthy
    ports:
      - "127.0.0.1:18082:8080"
    networks:
      - acumenus

  alfresco-postgres:
    container_name: alfresco-postgres
    image: postgres:17.9
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_PASSWORD: ${ALFRESCO_DB_PASSWORD:-alfresco}
      POSTGRES_USER: alfresco
      POSTGRES_DB: alfresco
    command: postgres -c max_connections=300 -c log_min_messages=LOG
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    volumes:
      - alfresco_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    networks:
      - acumenus

  alfresco-solr6:
    container_name: alfresco-solr6
    image: docker.io/alfresco/alfresco-search-services:2.0.18
    restart: unless-stopped
    mem_limit: 2g
    environment:
      SOLR_ALFRESCO_HOST: "alfresco"
      SOLR_ALFRESCO_PORT: "8080"
      SOLR_SOLR_HOST: "alfresco-solr6"
      SOLR_SOLR_PORT: "8983"
      SOLR_CREATE_ALFRESCO_DEFAULTS: "alfresco,archive"
      ALFRESCO_SECURE_COMMS: "secret"
      JAVA_TOOL_OPTIONS: >-
        -Dalfresco.secureComms.secret=${ALFRESCO_SOLR_SHARED_SECRET:-secret}
    ports:
      - "127.0.0.1:18083:8983"
    networks:
      - acumenus

  alfresco-activemq:
    container_name: alfresco-activemq
    image: docker.io/alfresco/alfresco-activemq:6.2.1-jre17-rockylinux8
    restart: unless-stopped
    mem_limit: 1g
    environment:
      ACTIVEMQ_ADMIN_LOGIN: ${ALFRESCO_AMQ_USER:-admin}
      ACTIVEMQ_ADMIN_PASSWORD: ${ALFRESCO_AMQ_PASSWORD:-admin}
    healthcheck:
      test: ["CMD", "/opt/activemq/bin/activemq", "query", "--objname", "type=Broker,brokerName=*,service=Health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    ports:
      - "127.0.0.1:18161:8161"
      - "127.0.0.1:15672:5672"
      - "127.0.0.1:16161:61616"
      - "127.0.0.1:16163:61613"
    networks:
      - acumenus

  alfresco-content-app:
    container_name: alfresco-content-app
    image: alfresco/alfresco-content-app:7.3.0
    restart: unless-stopped
    mem_limit: 128m
    environment:
      DOMAIN: ${DOMAIN:-acumenus.net}
      APP_BASE_SHARE_URL: "https://docs.${DOMAIN:-acumenus.net}/share/#/preview/s"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 1s
    depends_on:
      alfresco:
        condition: service_healthy
    ports:
      - "127.0.0.1:18084:8080"
    networks:
      - acumenus

  alfresco-control-center:
    container_name: alfresco-control-center
    image: quay.io/alfresco/alfresco-control-center:10.3.0
    restart: unless-stopped
    mem_limit: 128m
    environment:
      APP_CONFIG_PROVIDER: "ECM"
      APP_CONFIG_AUTH_TYPE: "BASIC"
      BASE_PATH: ./
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 1s
      retries: 3
      start_period: 1s
    depends_on:
      alfresco:
        condition: service_healthy
    ports:
      - "127.0.0.1:18085:8080"
    networks:
      - acumenus

volumes:
  alfresco_repository_data:
    external: true
    name: acropolis_alfresco_repository_data
  alfresco_postgres_data:
    external: true
    name: acropolis_alfresco_postgres_data

networks:
  acumenus:
    external: true
    name: acumenus
