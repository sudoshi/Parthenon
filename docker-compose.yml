services:
  nginx:
    container_name: parthenon-nginx
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8082}:80"
    volumes:
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./backend:/var/www/html:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./docs/site/build:/var/www/docs-dist:ro
      - ohif-dist:/var/www/ohif:ro
    environment:
      - ORTHANC_AUTH_HEADER=${ORTHANC_AUTH_HEADER:-}
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    depends_on:
      php:
        condition: service_healthy
      jupyterhub:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - parthenon
    restart: unless-stopped

  php:
    container_name: parthenon-php
    image: ghcr.io/sudoshi/parthenon-php:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
      - ./external/finngen:/opt/finngen:ro
      - ./dicom_samples:/var/www/html/dicom_samples:ro
      - ./.resendapikey:/var/www/.resendapikey:ro
    env_file:
      - ./backend/.env
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
      - acropolis
    restart: unless-stopped

  node:
    container_name: parthenon-node
    image: ghcr.io/sudoshi/parthenon-node:latest
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    ports:
      - "${VITE_PORT:-5175}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped
    profiles:
      - dev

  postgres:
    container_name: parthenon-postgres
    image: ghcr.io/sudoshi/parthenon-postgres:latest
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    ports:
      - "${POSTGRES_PORT:-5480}:5432"
    environment:
      POSTGRES_DB: parthenon
      POSTGRES_USER: parthenon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      # Bind mount instead of named volume — survives `docker compose down -v`
      - ${POSTGRES_DATA_DIR:-/home/smudoshi/parthenon-pgdata}:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/fixtures:/fixtures:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parthenon"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  redis:
    container_name: parthenon-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-parthenon_redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-parthenon_redis_secret}
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - parthenon
    restart: unless-stopped

  python-ai:
    container_name: parthenon-ai
    image: ghcr.io/sudoshi/parthenon-python-ai:latest
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    ports:
      - "${AI_PORT:-8002}:8000"
    volumes:
      - ./ai:/app
      - ./backend/resources/help:/var/www/html/resources/help:ro
      - ./docs:/app/docs:ro
      - ./GIS:/app/gis_data:ro
      - ./OHDSI-scraper/ohdsi_corpus:/app/ohdsi_corpus:ro
      - ./OHDSI-scraper/book_of_ohdsi:/app/book_of_ohdsi:ro
      - ./OHDSI-scraper/hades_vignettes:/app/hades_vignettes:ro
      - ./OHDSI-scraper/ohdsi_forums:/app/ohdsi_forums:ro
      - ./OHDSI-scraper/medical_textbooks_extracted:/app/medical_textbooks:ro
      - ./backend/storage/app:/var/www/html/storage/app:ro
    environment:
      - DATABASE_URL=postgresql://abby_analyst:${ABBY_PG_PASSWORD}@host.docker.internal:5432/parthenon
      - GIS_DATABASE_URL=postgresql://abby_analyst:${ABBY_PG_PASSWORD}@host.docker.internal:5432/parthenon
      - REDIS_URL=redis://redis:6379/2
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-MedAIBase/MedGemma1.5:4b}
      - HELP_DIR=/var/www/html/resources/help
      - DOCS_DIR=/app/docs
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - STUDY_AGENT_URL=http://study-agent:8765
      - HECATE_URL=http://hecate:8080
      - ARIADNE_VOCAB_SCHEMA=vocab
      - CUDA_VISIBLE_DEVICES=
      - TORCH_DEVICE=cpu
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CLAUDE_TIMEOUT=${CLAUDE_TIMEOUT:-60}
      - PHI_DETECTION_ENABLED=${PHI_DETECTION_ENABLED:-true}
      - CLOUD_MONTHLY_BUDGET_USD=${CLOUD_MONTHLY_BUDGET_USD:-500}
      - KNOWLEDGE_CDM_SCHEMA=omop
      - KNOWLEDGE_VOCAB_SCHEMA=vocab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - parthenon
    restart: unless-stopped

  morpheus-ingest:
    container_name: parthenon-morpheus-ingest
    image: ghcr.io/sudoshi/parthenon-morpheus-ingest:latest
    build:
      context: ./morpheus-ingest
      dockerfile: Dockerfile
    ports:
      - "8004:8000"
    # volumes:
    #   - ./morpheus-ingest:/app  # Disabled: empty dir clobbers container code
    environment:
      - MORPHEUS_DATABASE_URL=postgresql://parthenon:parthenon@postgres:5432/parthenon
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  chromadb:
    container_name: parthenon-chromadb
    image: chromadb/chroma:latest
    volumes:
      - chromadb-data:/data
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 6G
    networks:
      - parthenon
    restart: unless-stopped

  study-agent:
    container_name: parthenon-study-agent
    image: ghcr.io/sudoshi/parthenon-study-agent:latest
    build:
      context: .
      dockerfile: docker/study-agent/Dockerfile
    ports:
      - "${STUDY_AGENT_PORT:-8765}:8765"
    volumes:
      - study-agent-data:/data/phenotype-index
      - ./study-agent:/opt/study-agent:ro
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11434/v1/chat/completions}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_MODEL=${LLM_MODEL:-gemma3:4b}
      - EMBED_URL=${EMBED_URL:-http://host.docker.internal:11434/api/embed}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - PHENOTYPE_INDEX_DIR=/data/phenotype-index
      - MCP_PORT=3000
      - STUDY_AGENT_PORT=8765
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - STUDY_AGENT_HOST=0.0.0.0
      - STUDY_AGENT_THREADING=1
      - STUDY_AGENT_ALLOW_CORE_FALLBACK=1
      - FINNGEN_COHORT_OPERATIONS_ENABLED=1
      - FINNGEN_CO2_ANALYSIS_ENABLED=1
      - FINNGEN_HADES_EXTRAS_ENABLED=1
      - FINNGEN_ROMOPAPI_ENABLED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  jupyterhub:
    container_name: parthenon-jupyterhub
    image: ghcr.io/sudoshi/parthenon-jupyterhub:latest
    build:
      context: .
      dockerfile: docker/jupyterhub/Dockerfile
    ports:
      - "${JUPYTER_PORT:-8888}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jupyter-shared:/srv/jupyterhub/shared
      - jupyterhub-data:/srv/jupyterhub/data
    environment:
      - JUPYTERHUB_CRYPT_KEY=${JUPYTERHUB_CRYPT_KEY}
      - JUPYTER_JWT_SECRET=${JUPYTER_JWT_SECRET}
      - JUPYTER_HUB_API_KEY=${JUPYTER_HUB_API_KEY}
      - PARTHENON_API_URL=http://nginx/api/v1
      - DOCKER_NETWORK_NAME=parthenon
      - JUPYTER_USER_NETWORK_NAME=parthenon_jupyter_users
      - JUPYTER_IMAGE=parthenon-jupyter-user
      - JUPYTER_IDLE_TIMEOUT=${JUPYTER_IDLE_TIMEOUT:-1800}
      - JUPYTER_MEM_LIMIT=${JUPYTER_MEM_LIMIT:-2G}
      - JUPYTER_CPU_LIMIT=${JUPYTER_CPU_LIMIT:-1.0}
      - JUPYTER_DB_RESEARCHER_PASSWORD=${JUPYTER_DB_RESEARCHER_PASSWORD}
      - JUPYTER_DB_ADMIN_PASSWORD=${JUPYTER_DB_ADMIN_PASSWORD}
      - PARTHENON_DB_NAME=parthenon
      - PARTHENON_DB_HOST_IP=${PARTHENON_DB_HOST_IP:-}
      - PARTHENON_DB_HOST_NAME=${PARTHENON_DB_HOST_NAME:-pgsql.acumenus.net}
      - PARTHENON_REPO_PATH=${PWD:-.}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/jupyter/hub/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
      - jupyter_users
    restart: unless-stopped

  # Build-only: image used by JupyterHub DockerSpawner (not started by compose)
  jupyter-user:
    image: parthenon-jupyter-user:latest
    build:
      context: .
      dockerfile: docker/jupyter-user/Dockerfile
    profiles:
      - build

  finngen-runner:
    container_name: parthenon-finngen-runner
    image: ghcr.io/sudoshi/parthenon-finngen-runner:latest
    build:
      context: .
      dockerfile: docker/finngen-runner/Dockerfile
    ports:
      - "${FINNGEN_RUNNER_PORT:-8786}:8786"
    volumes:
      - ./external/finngen:/opt/finngen:ro
      - finngen-runner-state:/opt/runner-state
      - finngen-runner-r-lib:/usr/local/lib/R/site-library
    environment:
      - MAKEFLAGS=-j1
      - MAKE=make -j1
      - CMAKE_BUILD_PARALLEL_LEVEL=1
      - R_REMOTES_UPGRADE=never
      - DATABASECONNECTOR_JAR_FOLDER=/opt/runner-state/jdbc
      - CDM_DB_HOST=${DB_HOST:-pgsql.acumenus.net}
      - CDM_DB_PORT=${DB_PORT:-5432}
      - CDM_DB_DATABASE=${DB_DATABASE:-ohdsi}
      - CDM_DB_USERNAME=${DB_USERNAME:-smudoshi}
      - CDM_DB_PASSWORD=${DB_PASSWORD:-acumenus}
      - CDM_DB_SCHEMA=${CDM_DB_SEARCH_PATH:-cdm}
      - VOCAB_DB_SCHEMA=${VOCAB_DB_SEARCH_PATH:-vocab}
      - RESULTS_DB_SCHEMA=${RESULTS_DB_SEARCH_PATH:-results}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8786/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20m
    mem_limit: 24g
    deploy:
      resources:
        limits:
          memory: 24G
    networks:
      - parthenon
    restart: unless-stopped

  qdrant:
    container_name: parthenon-qdrant
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB=20000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 8G
    networks:
      - parthenon
    restart: unless-stopped

  hecate:
    container_name: parthenon-hecate
    image: ghcr.io/sudoshi/parthenon-hecate:latest
    build:
      context: .
      dockerfile: docker/hecate/Dockerfile
    ports:
      - "${HECATE_PORT:-8088}:8080"
    volumes:
      - ./output/hecate-bootstrap:/app/data:ro
      - ./output/hecate-bootstrap/ConceptRecordCounts.json:/app/ConceptRecordCounts.json:ro
    env_file:
      - backend/.env
    environment:
      - SERVER_ADDR=0.0.0.0:8080
      - VECTORDB_DATA_PATH=/app/data/all_pairs.txt
      - QDRANT_URI=http://qdrant:6334
      - CORS_ORIGINS=http://nginx:80
      - OPENAI_BASE_URL=http://host.docker.internal:11434/v1
      - OPENAI_API_KEY=not-needed
      - PG__USER=${HECATE_PG_USER:-claude_dev}
      - PG__PASSWORD=${HECATE_PG_PASSWORD}
      - PG__HOST=host.docker.internal
      - PG__PORT=5432
      - PG__DBNAME=${HECATE_PG_DBNAME:-parthenon}
      - PG__POOL_MAX_SIZE=16
      - VOCAB_SCHEMA=vocab
      - CACHE_MAX_CAPACITY=32
      - CACHE_TTL_DAYS=10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf 'http://localhost:8080/api/search?q=health&limit=1' -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  solr:
    container_name: parthenon-solr
    image: solr:9.7
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      - solr_data:/var/solr
      - ./solr/configsets/vocabulary:/opt/solr/server/solr/configsets/vocabulary:ro
      - ./solr/configsets/cohorts:/opt/solr/server/solr/configsets/cohorts:ro
      - ./solr/configsets/analyses:/opt/solr/server/solr/configsets/analyses:ro
      - ./solr/configsets/mappings:/opt/solr/server/solr/configsets/mappings:ro
      - ./solr/configsets/clinical:/opt/solr/server/solr/configsets/clinical:ro
      - ./solr/configsets/imaging:/opt/solr/server/solr/configsets/imaging:ro
      - ./solr/configsets/claims:/opt/solr/server/solr/configsets/claims:ro
      - ./solr/configsets/gis_spatial:/opt/solr/server/solr/configsets/gis_spatial:ro
      - ./solr/configsets/vector_explorer:/opt/solr/server/solr/configsets/vector_explorer:ro
      - ./solr/configsets/query_library:/opt/solr/server/solr/configsets/query_library:ro
    environment:
      - SOLR_JAVA_MEM=-Xms512m -Xmx2g
    command: bash -c "precreate-core vocabulary /opt/solr/server/solr/configsets/vocabulary; precreate-core cohorts /opt/solr/server/solr/configsets/cohorts; precreate-core analyses /opt/solr/server/solr/configsets/analyses; precreate-core mappings /opt/solr/server/solr/configsets/mappings; precreate-core clinical /opt/solr/server/solr/configsets/clinical; precreate-core imaging /opt/solr/server/solr/configsets/imaging; precreate-core claims /opt/solr/server/solr/configsets/claims; precreate-core gis_spatial /opt/solr/server/solr/configsets/gis_spatial; precreate-core vector_explorer /opt/solr/server/solr/configsets/vector_explorer; precreate-core query_library /opt/solr/server/solr/configsets/query_library; exec solr-foreground"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8983/solr/vocabulary/admin/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - parthenon
    restart: unless-stopped

  blackrabbit:
    container_name: parthenon-blackrabbit
    image: ghcr.io/sudoshi/parthenon-blackrabbit:latest
    build:
      context: .
      dockerfile: docker/blackrabbit/Dockerfile
    ports:
      - "${WHITERABBIT_PORT:-8090}:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BLACKRABBIT_SCAN_TIMEOUT_SECONDS=${SCAN_TIMEOUT_SECONDS:-1200}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  darkstar:
    container_name: parthenon-darkstar
    image: ghcr.io/sudoshi/parthenon-darkstar:latest
    build:
      context: .
      dockerfile: docker/r/Dockerfile
    ports:
      - "${R_PORT:-8787}:8787"
    volumes:
      - ./darkstar:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://smudoshi:acumenus@host.docker.internal:5432/ohdsi
      - _JAVA_OPTIONS=-Xmx8g -Xms2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      - R_MAX_VSIZE=24Gb
    depends_on:
      postgres:
        condition: service_healthy
    # Docker health check disabled — s6-overlay handles crash recovery internally.
    # The deep /health endpoint is still available for monitoring (Grafana, etc.)
    # but Docker should NOT restart the container during long-running analyses.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 32G
    networks:
      - parthenon
    restart: unless-stopped

  horizon:
    container_name: parthenon-horizon
    image: ghcr.io/sudoshi/parthenon-php:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
      - ./.resendapikey:/var/www/.resendapikey:ro
    env_file:
      - ./backend/.env
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    mem_limit: 2g
    networks:
      - parthenon
    restart: unless-stopped

  reverb:
    container_name: parthenon-reverb
    image: ghcr.io/sudoshi/parthenon-php:latest
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "${REVERB_PORT:-8080}:8080"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/var/www/html
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "echo @fsockopen('127.0.0.1', 8080) ? 'ok' : exit(1);"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - parthenon
    restart: unless-stopped

  orthanc:
    container_name: parthenon-orthanc
    image: orthancteam/orthanc:latest
    ports:
      - "${ORTHANC_PORT:-8042}:8042"
    volumes:
      - /mnt/md0/orthanc-data-pg:/var/lib/orthanc/db       # All DICOM files (937K instances, NVMe RAID0)
      - ./dicom_samples:/dicom_samples:ro
    environment:
      - ORTHANC__NAME=Parthenon Orthanc
      - ORTHANC__REMOTE_ACCESS_ALLOWED=true
      - ORTHANC__AUTHENTICATION_ENABLED=true
      - 'ORTHANC__REGISTERED_USERS={"${ORTHANC_USER:-parthenon}": "${ORTHANC_PASSWORD}"}'
      - ORTHANC_USER=${ORTHANC_USER:-parthenon}
      - ORTHANC_PASSWORD=${ORTHANC_PASSWORD}
      # DICOMweb plugin
      - DICOM_WEB_PLUGIN_ENABLED=true
      - ORTHANC__DICOM_WEB__ENABLE=true
      - ORTHANC__DICOM_WEB__ROOT=/dicom-web/
      - ORTHANC__DICOM_WEB__ENABLE_WADO=true
      - ORTHANC__DICOM_WEB__WADO_ROOT=/wado
      - ORTHANC__DICOM_WEB__STUDIES_METADATA=MainDicomTags
      - ORTHANC__DICOM_WEB__ENABLE_METADATA_CACHE=true
      # Transcoding: serve compressed pixel data to reduce transfer size
      - ORTHANC__BUILTIN_DECODER_TRANSCODER_ORDER=After
      - ORTHANC__INGEST_TRANSCODING=1.2.840.10008.1.2.1
      # Query limits — prevent full-table scans on large datasets
      - ORTHANC__LIMIT_FIND_RESULTS=100
      - ORTHANC__LIMIT_FIND_INSTANCES=50
      - ORTHANC__CONCURRENT_JOBS=4
      # PostgreSQL index — concurrent query support for 926K+ instances
      - ORTHANC__POSTGRESQL__ENABLE_INDEX=true
      - ORTHANC__POSTGRESQL__ENABLE_STORAGE=false
      - ORTHANC__POSTGRESQL__HOST=host.docker.internal
      - ORTHANC__POSTGRESQL__PORT=${DB_PORT:-5432}
      - ORTHANC__POSTGRESQL__DATABASE=${DB_DATABASE:-parthenon}
      - ORTHANC__POSTGRESQL__USERNAME=${DB_USERNAME:-smudoshi}
      - ORTHANC__POSTGRESQL__PASSWORD=${DB_PASSWORD:-acumenus}
      - ORTHANC__POSTGRESQL__INDEX_CONNECTIONS_COUNT=5
      - ORTHANC__POSTGRESQL__PREPARE_INDEX=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,base64,os; urllib.request.urlopen(urllib.request.Request('http://localhost:8042/system', headers={'Authorization': 'Basic ' + base64.b64encode((os.environ.get('ORTHANC_USER','parthenon') + ':' + os.environ.get('ORTHANC_PASSWORD','')).encode()).decode()}))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - parthenon
    restart: unless-stopped

  ohif-build:
    container_name: parthenon-ohif-build
    image: ghcr.io/sudoshi/parthenon-ohif-build:latest
    build:
      context: ./docker/ohif
    entrypoint: ["sh", "-c", "cp -a /dist/. /output/ && cp /config/app-config.js /output/app-config.js"]
    volumes:
      - ohif-dist:/output
      - ./docker/ohif/app-config.js:/config/app-config.js:ro
    deploy:
      resources:
        limits:
          memory: 2G
    profiles:
      - setup

  docs-build:
    container_name: parthenon-docs-build
    image: node:22-alpine
    working_dir: /docs
    environment:
      - DOCKER_BUILD=1
      - NODE_OPTIONS=--max-old-space-size=5120
    volumes:
      - ./docs/site:/docs
      - ./docs/blog:/blog:ro
      - ./docs/site/build:/dist
      - ./backend/public/docs/openapi.yaml:/docs/openapi.yaml:ro
    command: sh -c "npm ci --legacy-peer-deps && DOCKER_BUILD=1 npm run build:docker"
    deploy:
      resources:
        limits:
          memory: 8G
    profiles:
      - docs

  fhir-to-cdm:
    container_name: parthenon-fhir-to-cdm
    image: ghcr.io/sudoshi/parthenon-fhir-to-cdm:latest
    build:
      context: .
      dockerfile: docker/fhir-to-cdm/Dockerfile
    ports:
      - "${FHIR_TO_CDM_PORT:-8091}:8091"
    environment:
      - PG_HOST=host.docker.internal
      - PG_PORT=5432
      - PG_DATABASE=${FHIR_CDM_PG_DATABASE:-ohdsi}
      - PG_USER=${FHIR_CDM_PG_USER:-smudoshi}
      - PG_PASSWORD=${FHIR_CDM_PG_PASSWORD:-}
      - CDM_SCHEMA=${FHIR_CDM_SCHEMA:-cdm}
      - VOCAB_SCHEMA=${FHIR_VOCAB_SCHEMA:-omop}
      - FHIR_CDM_BINARY=/app/dotnet/FHIRtoCDM
      - FHIR_INPUT_DIR=/tmp/fhir_input
      - CDM_OUTPUT_DIR=/tmp/cdm_output
      - FHIR_CDM_TIMEOUT=300
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  # ── Monitoring Stack ─────────────────────────────────────────────────────

  # Grafana moved to acropolis/docker-compose.community.yml

  prometheus:
    container_name: parthenon-prometheus
    image: prom/prometheus:v3.1.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  alertmanager:
    container_name: parthenon-alertmanager
    image: prom/alertmanager:v0.28.0
    entrypoint:
      - /bin/sh
    command:
      - /etc/alertmanager/start.sh
    volumes:
      - ./monitoring/alertmanager/start.sh:/etc/alertmanager/start.sh:ro
      - alertmanager_data:/alertmanager
    environment:
      MATTERMOST_WEBHOOK_URL: ${MATTERMOST_WEBHOOK_URL:-}
      MATTERMOST_CHANNEL: ${MATTERMOST_CHANNEL:-}
      MATTERMOST_USERNAME: ${MATTERMOST_USERNAME:-Parthenon Alerts}
      MATTERMOST_ICON_EMOJI: ${MATTERMOST_ICON_EMOJI:-:rotating_light:}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - parthenon
    restart: unless-stopped

  postgres-exporter:
    container_name: parthenon-postgres-exporter
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_URI: "postgres:5432/parthenon?sslmode=disable"
      DATA_SOURCE_USER: parthenon
      DATA_SOURCE_PASS: ${DB_PASSWORD:-secret}
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9187/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - parthenon
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    container_name: parthenon-redis-exporter
    image: oliver006/redis_exporter:v1.66.0-alpine
    command:
      - --check-single-keys=queues:cohort,queues:similarity,queues:default
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-parthenon_redis_secret}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9121/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - parthenon
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  cadvisor:
    container_name: parthenon-cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    cap_add:
      - SYS_PTRACE
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --disable_metrics=advtcp,cpu_topology,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  node-exporter:
    container_name: parthenon-node-exporter
    image: prom/node-exporter:v1.8.2
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--web.listen-address=:9100'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped

  loki:
    container_name: parthenon-loki
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  alloy:
    container_name: parthenon-alloy
    image: grafana/alloy:v1.8.0
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/apache2:/var/log/apache2:ro
      - /var/log/postgresql:/var/log/postgresql:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/12345 && printf \"GET /ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && timeout 5 cat <&3 | head -1 | grep -q 200'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - parthenon
    depends_on:
      - loki
    restart: unless-stopped

  # Poseidon — Dagster webserver (Dagit UI + GraphQL API)
  poseidon-webserver:
    container_name: parthenon-poseidon-webserver
    build:
      context: .
      dockerfile: poseidon/docker/poseidon/Dockerfile
    command: dagster-webserver -h 0.0.0.0 -p 3100 -f poseidon/dagster/definitions.py
    ports:
      - "${POSEIDON_PORT:-3100}:3100"
    volumes:
      - ./poseidon:/app/poseidon
      - poseidon_storage:/app/storage
    environment:
      - DAGSTER_HOME=/app/storage
      - DATABASE_URL=postgresql://claude_dev:${HECATE_PG_PASSWORD}@host.docker.internal:5432/parthenon
      - DBT_PROFILES_DIR=/app/poseidon/dbt
      - POSEIDON_PG_HOST=host.docker.internal
      - POSEIDON_PG_USER=claude_dev
      - POSEIDON_PG_PASSWORD=${HECATE_PG_PASSWORD}
      - PARTHENON_API_URL=http://nginx:80/api/v1
      - REDIS_URL=redis://:${REDIS_PASSWORD:-parthenon_redis_secret}@redis:6379/0
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3100/server_info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  # Poseidon — Dagster daemon (schedules, sensors, run launcher)
  poseidon-daemon:
    container_name: parthenon-poseidon-daemon
    build:
      context: .
      dockerfile: poseidon/docker/poseidon/Dockerfile
    command: dagster-daemon run -f poseidon/dagster/definitions.py
    volumes:
      - ./poseidon:/app/poseidon
      - poseidon_storage:/app/storage
    environment:
      - DAGSTER_HOME=/app/storage
      - DATABASE_URL=postgresql://claude_dev:${HECATE_PG_PASSWORD}@host.docker.internal:5432/parthenon
      - DBT_PROFILES_DIR=/app/poseidon/dbt
      - POSEIDON_PG_HOST=host.docker.internal
      - POSEIDON_PG_USER=claude_dev
      - POSEIDON_PG_PASSWORD=${HECATE_PG_PASSWORD}
      - PARTHENON_API_URL=http://nginx:80/api/v1
      - REDIS_URL=redis://:${REDIS_PASSWORD:-parthenon_redis_secret}@redis:6379/0
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      poseidon-webserver:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  # Arachne Data Node (optional — start with: docker compose --profile arachne up -d)
  arachne-datanode:
    image: odysseusinc/arachne-datanode-ce:latest
    profiles: ["arachne"]
    container_name: parthenon-arachne-datanode
    environment:
      ARACHNE_CENTRAL_URL: ${ARACHNE_URL:-http://arachne-central:8080}
      DATANODE_PORT: 8880
    ports:
      - "${ARACHNE_DATANODE_PORT:-8880}:8880"
    networks:
      - parthenon
    restart: unless-stopped

volumes:
  # postgres-data removed — using host bind mount instead (survives docker compose down -v)
  poseidon_storage:
    driver: local
  redis-data:
  solr_data:
  orthanc-data:
  chromadb-data:
  study-agent-data:
  qdrant-data:
  finngen-runner-state:
  finngen-runner-r-lib:
  hecate-data:
  ohif-dist:
  prometheus_data:
  alertmanager_data:
  loki_data:
  alloy_data:
  jupyter-shared:
  jupyterhub-data:

networks:
  parthenon:
    name: parthenon
    driver: bridge
  acropolis:
    name: acropolis_network
    external: true
  jupyter_users:
    name: parthenon_jupyter_users
