services:
  nginx:
    container_name: parthenon-nginx
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8082}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./docs/dist:/var/www/docs-dist:ro
      - ohif-dist:/var/www/ohif:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - parthenon
    restart: unless-stopped

  php:
    container_name: parthenon-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
      - ./dicom_samples:/var/www/html/dicom_samples:ro
      - ./.resendapikey:/var/www/.resendapikey:ro
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  node:
    container_name: parthenon-node
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    ports:
      - "${VITE_PORT:-5175}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - parthenon
    restart: unless-stopped
    profiles:
      - dev

  postgres:
    container_name: parthenon-postgres
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5480}:5432"
    environment:
      POSTGRES_DB: parthenon
      POSTGRES_USER: parthenon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/fixtures:/fixtures:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parthenon"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  redis:
    container_name: parthenon-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - parthenon
    restart: unless-stopped

  python-ai:
    container_name: parthenon-ai
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    ports:
      - "${AI_PORT:-8002}:8000"
    volumes:
      - ./ai:/app
      - ./backend/resources/help:/var/www/html/resources/help:ro
    environment:
      - DATABASE_URL=postgresql://parthenon:${DB_PASSWORD:-secret}@postgres:5432/parthenon
      - REDIS_URL=redis://redis:6379/2
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-MedAIBase/MedGemma1.5:4b}
      - HELP_DIR=/var/www/html/resources/help
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - parthenon
    restart: unless-stopped

  solr:
    container_name: parthenon-solr
    image: solr:9.7
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      - solr_data:/var/solr
      - ./solr/configsets/vocabulary:/opt/solr/server/solr/configsets/vocabulary:ro
      - ./solr/configsets/cohorts:/opt/solr/server/solr/configsets/cohorts:ro
      - ./solr/configsets/analyses:/opt/solr/server/solr/configsets/analyses:ro
      - ./solr/configsets/mappings:/opt/solr/server/solr/configsets/mappings:ro
      - ./solr/configsets/clinical:/opt/solr/server/solr/configsets/clinical:ro
    environment:
      - SOLR_JAVA_MEM=-Xms512m -Xmx2g
    command: bash -c "precreate-core vocabulary /opt/solr/server/solr/configsets/vocabulary; precreate-core cohorts /opt/solr/server/solr/configsets/cohorts; precreate-core analyses /opt/solr/server/solr/configsets/analyses; precreate-core mappings /opt/solr/server/solr/configsets/mappings; precreate-core clinical /opt/solr/server/solr/configsets/clinical; exec solr-foreground"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8983/solr/vocabulary/admin/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - parthenon
    restart: unless-stopped

  r-runtime:
    container_name: parthenon-r
    build:
      context: .
      dockerfile: docker/r/Dockerfile
    ports:
      - "${R_PORT:-8787}:8787"
    volumes:
      - ./r-runtime:/app
    environment:
      - DATABASE_URL=postgresql://parthenon:${DB_PASSWORD:-secret}@postgres:5432/parthenon
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - parthenon
    restart: unless-stopped

  horizon:
    container_name: parthenon-horizon
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
      - ./.resendapikey:/var/www/.resendapikey:ro
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - parthenon
    restart: unless-stopped

  orthanc:
    container_name: parthenon-orthanc
    image: orthancteam/orthanc:latest
    ports:
      - "${ORTHANC_PORT:-8042}:8042"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
    environment:
      - ORTHANC__NAME=Parthenon Orthanc
      - ORTHANC__REMOTE_ACCESS_ALLOWED=true
      - ORTHANC__AUTHENTICATION_ENABLED=false
      - DICOM_WEB_PLUGIN_ENABLED=true
      - ORTHANC__DICOM_WEB__ENABLE=true
      - ORTHANC__DICOM_WEB__ROOT=/dicom-web/
      - ORTHANC__DICOM_WEB__ENABLE_WADO=true
      - ORTHANC__DICOM_WEB__WADO_ROOT=/wado
      - ORTHANC__DICOM_WEB__STUDIES_METADATA=Full
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8042/system')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  ohif-build:
    container_name: parthenon-ohif-build
    build:
      context: ./docker/ohif
    entrypoint: ["sh", "-c", "cp -a /dist/. /output/ && cp /config/app-config.js /output/app-config.js"]
    volumes:
      - ohif-dist:/output
      - ./docker/ohif/app-config.js:/config/app-config.js:ro
    profiles:
      - setup

  docs-build:
    container_name: parthenon-docs-build
    image: node:22-alpine
    working_dir: /docs
    volumes:
      - ./docs/site:/docs:ro
      - ./docs/dist:/dist
    command: sh -c "npm ci && npm run build:docker"
    profiles:
      - docs

volumes:
  postgres-data:
  redis-data:
  solr_data:
  orthanc-data:
  ohif-dist:

networks:
  parthenon:
    driver: bridge
