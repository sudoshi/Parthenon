services:
  nginx:
    container_name: parthenon-nginx
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8082}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./docs/dist:/var/www/docs-dist:ro
      - ohif-dist:/var/www/ohif:ro
    depends_on:
      php:
        condition: service_healthy
    networks:
      - parthenon
    restart: unless-stopped

  php:
    container_name: parthenon-php
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
      - ./dicom_samples:/var/www/html/dicom_samples:ro
      - ./.resendapikey:/var/www/.resendapikey:ro
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  node:
    container_name: parthenon-node
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    ports:
      - "${VITE_PORT:-5175}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - parthenon
    restart: unless-stopped
    profiles:
      - dev

  postgres:
    container_name: parthenon-postgres
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    ports:
      - "${POSTGRES_PORT:-5480}:5432"
    environment:
      POSTGRES_DB: parthenon
      POSTGRES_USER: parthenon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/fixtures:/fixtures:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parthenon"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  redis:
    container_name: parthenon-redis
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6381}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - parthenon
    restart: unless-stopped

  python-ai:
    container_name: parthenon-ai
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    ports:
      - "${AI_PORT:-8002}:8000"
    volumes:
      - ./ai:/app
      - ./backend/resources/help:/var/www/html/resources/help:ro
      - ./docs:/app/docs:ro
      - ./GIS:/app/gis_data:ro
    environment:
      - DATABASE_URL=postgresql://parthenon:${DB_PASSWORD:-secret}@postgres:5432/parthenon
      - GIS_DATABASE_URL=postgresql://smudoshi:acumenus@host.docker.internal:5432/ohdsi
      - REDIS_URL=redis://redis:6379/2
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-MedAIBase/MedGemma1.5:4b}
      - HELP_DIR=/var/www/html/resources/help
      - DOCS_DIR=/app/docs
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - STUDY_AGENT_URL=http://study-agent:8765
      - HECATE_URL=http://hecate:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - parthenon
    restart: unless-stopped

  chromadb:
    container_name: parthenon-chromadb
    image: chromadb/chroma:latest
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  study-agent:
    container_name: parthenon-study-agent
    build:
      context: .
      dockerfile: docker/study-agent/Dockerfile
    ports:
      - "${STUDY_AGENT_PORT:-8765}:8765"
    volumes:
      - study-agent-data:/data/phenotype-index
      - ./study-agent:/opt/study-agent:ro
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11434/v1/chat/completions}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_MODEL=${LLM_MODEL:-gemma3:4b}
      - EMBED_URL=${EMBED_URL:-http://host.docker.internal:11434/api/embed}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - PHENOTYPE_INDEX_DIR=/data/phenotype-index
      - MCP_PORT=3000
      - STUDY_AGENT_PORT=8765
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - STUDY_AGENT_HOST=0.0.0.0
      - STUDY_AGENT_THREADING=1
      - STUDY_AGENT_ALLOW_CORE_FALLBACK=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  qdrant:
    container_name: parthenon-qdrant
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  hecate:
    container_name: parthenon-hecate
    build:
      context: .
      dockerfile: docker/hecate/Dockerfile
    ports:
      - "${HECATE_PORT:-8080}:8080"
    environment:
      - SERVER_ADDR=0.0.0.0:8080
      - QDRANT_URI=http://qdrant:6334
      - PG__USER=${HECATE_PG_USER:-smudoshi}
      - PG__PASSWORD=${HECATE_PG_PASSWORD:-}
      - PG__HOST=host.docker.internal
      - PG__PORT=5432
      - PG__DBNAME=${HECATE_PG_DBNAME:-ohdsi}
      - PG__POOL_MAX_SIZE=16
      - VOCAB_SCHEMA=omop
      - CACHE_MAX_CAPACITY=32
      - CACHE_TTL_DAYS=10
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f 'http://localhost:8080/api/search?q=test' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  solr:
    container_name: parthenon-solr
    image: solr:9.7
    ports:
      - "${SOLR_PORT:-8983}:8983"
    volumes:
      - solr_data:/var/solr
      - ./solr/configsets/vocabulary:/opt/solr/server/solr/configsets/vocabulary:ro
      - ./solr/configsets/cohorts:/opt/solr/server/solr/configsets/cohorts:ro
      - ./solr/configsets/analyses:/opt/solr/server/solr/configsets/analyses:ro
      - ./solr/configsets/mappings:/opt/solr/server/solr/configsets/mappings:ro
      - ./solr/configsets/clinical:/opt/solr/server/solr/configsets/clinical:ro
      - ./solr/configsets/imaging:/opt/solr/server/solr/configsets/imaging:ro
      - ./solr/configsets/claims:/opt/solr/server/solr/configsets/claims:ro
      - ./solr/configsets/gis_spatial:/opt/solr/server/solr/configsets/gis_spatial:ro
    environment:
      - SOLR_JAVA_MEM=-Xms512m -Xmx2g
    command: bash -c "precreate-core vocabulary /opt/solr/server/solr/configsets/vocabulary; precreate-core cohorts /opt/solr/server/solr/configsets/cohorts; precreate-core analyses /opt/solr/server/solr/configsets/analyses; precreate-core mappings /opt/solr/server/solr/configsets/mappings; precreate-core clinical /opt/solr/server/solr/configsets/clinical; precreate-core imaging /opt/solr/server/solr/configsets/imaging; precreate-core claims /opt/solr/server/solr/configsets/claims; precreate-core gis_spatial /opt/solr/server/solr/configsets/gis_spatial; exec solr-foreground"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8983/solr/vocabulary/admin/ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
    networks:
      - parthenon
    restart: unless-stopped

  whiterabbit:
    container_name: parthenon-whiterabbit
    build:
      context: .
      dockerfile: docker/whiterabbit/Dockerfile
    ports:
      - "${WHITERABBIT_PORT:-8090}:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - parthenon
    restart: unless-stopped

  r-runtime:
    container_name: parthenon-r
    build:
      context: .
      dockerfile: docker/r/Dockerfile
    ports:
      - "${R_PORT:-8787}:8787"
    volumes:
      - ./r-runtime:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://parthenon:${DB_PASSWORD:-secret}@postgres:5432/parthenon
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - parthenon
    restart: unless-stopped

  horizon:
    container_name: parthenon-horizon
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
      - ./.resendapikey:/var/www/.resendapikey:ro
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - parthenon
    restart: unless-stopped

  orthanc:
    container_name: parthenon-orthanc
    image: orthancteam/orthanc:latest
    ports:
      - "${ORTHANC_PORT:-8042}:8042"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./dicom_samples:/dicom_samples:ro
    environment:
      - ORTHANC__NAME=Parthenon Orthanc
      - ORTHANC__REMOTE_ACCESS_ALLOWED=true
      - ORTHANC__AUTHENTICATION_ENABLED=false
      - DICOM_WEB_PLUGIN_ENABLED=true
      - ORTHANC__DICOM_WEB__ENABLE=true
      - ORTHANC__DICOM_WEB__ROOT=/dicom-web/
      - ORTHANC__DICOM_WEB__ENABLE_WADO=true
      - ORTHANC__DICOM_WEB__WADO_ROOT=/wado
      - ORTHANC__DICOM_WEB__STUDIES_METADATA=Full
      # Transcoding: serve compressed pixel data to reduce transfer size
      - ORTHANC__BUILTIN_DECODER_TRANSCODER_ORDER=After
      - ORTHANC__INGEST_TRANSCODING=1.2.840.10008.1.2.1
      - ORTHANC__DICOM_WEB__ENABLE_METADATA_CACHE=true
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8042/system')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

  ohif-build:
    container_name: parthenon-ohif-build
    build:
      context: ./docker/ohif
    entrypoint: ["sh", "-c", "cp -a /dist/. /output/ && cp /config/app-config.js /output/app-config.js"]
    volumes:
      - ohif-dist:/output
      - ./docker/ohif/app-config.js:/config/app-config.js:ro
    profiles:
      - setup

  docs-build:
    container_name: parthenon-docs-build
    image: node:22-alpine
    working_dir: /docs
    volumes:
      - ./docs/site:/docs
      - ./docs/blog:/blog:ro
      - ./docs/dist:/dist
    command: sh -c "npm ci --legacy-peer-deps && npm run build:docker"
    profiles:
      - docs

  fhir-to-cdm:
    container_name: parthenon-fhir-to-cdm
    build:
      context: .
      dockerfile: docker/fhir-to-cdm/Dockerfile
    ports:
      - "${FHIR_TO_CDM_PORT:-8091}:8091"
    environment:
      - PG_HOST=host.docker.internal
      - PG_PORT=5432
      - PG_DATABASE=${FHIR_CDM_PG_DATABASE:-ohdsi}
      - PG_USER=${FHIR_CDM_PG_USER:-smudoshi}
      - PG_PASSWORD=${FHIR_CDM_PG_PASSWORD:-}
      - CDM_SCHEMA=${FHIR_CDM_SCHEMA:-cdm}
      - VOCAB_SCHEMA=${FHIR_VOCAB_SCHEMA:-omop}
      - FHIR_CDM_BINARY=/app/dotnet/FHIRtoCDM
      - FHIR_INPUT_DIR=/tmp/fhir_input
      - CDM_OUTPUT_DIR=/tmp/cdm_output
      - FHIR_CDM_TIMEOUT=300
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - parthenon
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  solr_data:
  orthanc-data:
  chromadb-data:
  study-agent-data:
  qdrant-data:
  hecate-data:
  ohif-dist:

networks:
  parthenon:
    driver: bridge
