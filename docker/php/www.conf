[www]
; ── Process Manager ─────────────────────────────────────────────────
; dynamic: starts min_spare, scales to max_children under load
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

; Recycle workers after 500 requests to prevent memory leaks
pm.max_requests = 500

; ── Healthcheck ─────────────────────────────────────────────────────
pm.status_path = /status
ping.path = /ping

; ── Timeouts ────────────────────────────────────────────────────────
; Allow long-running Achilles/HADES queries but not indefinite hangs
request_terminate_timeout = 300s

; ── Slow log (helps diagnose what's blocking workers) ───────────────
slowlog = /proc/self/fd/2
request_slowlog_timeout = 10s
