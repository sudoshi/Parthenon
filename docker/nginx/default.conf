upstream php-fpm {
    server php:9000;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 100M;

    # Use Docker DNS resolver so optional upstreams don't crash nginx
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API routes -> Laravel
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Horizon dashboard
    location /horizon {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # AI service proxy (optional — resolves at request time)
    location /ai/ {
        set $ai_upstream http://python-ai:8000;
        proxy_pass $ai_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # R runtime proxy (optional — resolves at request time)
    location /r/ {
        set $r_upstream http://r-runtime:8787;
        proxy_pass $r_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback - serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
    }
}
