# Wazuh API — Hardened Configuration
# See: https://documentation.wazuh.com/current/user-manual/api/configuration.html

host:
  - 0.0.0.0
port: 55000

https:
  enabled: yes
  key: "server.key"
  cert: "server.crt"
  use_ca: false
  ssl_protocol: "auto"
  ssl_ciphers: ""

access:
  max_login_attempts: 10
  block_time: 600
  max_request_per_minute: 100

logs:
  level: "warning"
  format: "plain"
