# Acropolis — Parthenon Internal Routes (Apache handles production TLS)
http:
  routers:
    parthenon-poseidon:
      rule: "Host(`poseidon.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-poseidon
    parthenon-study-agent:
      rule: "Host(`study-agent.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-study-agent
    parthenon-finngen:
      rule: "Host(`finngen.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-finngen
    parthenon-prometheus:
      rule: "Host(`prometheus.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-prometheus
    parthenon-fhir:
      rule: "Host(`fhir.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-fhir
    parthenon-morpheus:
      rule: "Host(`morpheus.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-morpheus
    # Grafana moved to acropolis community compose (Docker labels handle routing)
    parthenon-hecate:
      rule: "Host(`hecate.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-hecate
    parthenon-blackrabbit:
      rule: "Host(`blackrabbit.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-blackrabbit
    parthenon-solr:
      rule: "Host(`solr.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-solr
    parthenon-ai:
      rule: "Host(`ai.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-ai
    parthenon-ws:
      rule: "Host(`ws.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-ws
      middlewares:
        - websocket-headers
    parthenon-darkstar:
      rule: "Host(`darkstar.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-darkstar
    parthenon-parthenon:
      rule: "Host(`parthenon.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-parthenon
    parthenon-jupyter:
      rule: "Host(`jupyter.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-jupyter
    parthenon-orthanc:
      rule: "Host(`orthanc.acumenus.net`)"
      entryPoints:
        - web
      service: parthenon-orthanc

  services:
    parthenon-poseidon:
      loadBalancer:
        servers:
          - url: "http://parthenon-poseidon-webserver:3100"
    parthenon-study-agent:
      loadBalancer:
        servers:
          - url: "http://parthenon-study-agent:8765"
    parthenon-finngen:
      loadBalancer:
        servers:
          - url: "http://parthenon-finngen-runner:8786"
    parthenon-prometheus:
      loadBalancer:
        servers:
          - url: "http://parthenon-prometheus:9090"
    parthenon-fhir:
      loadBalancer:
        servers:
          - url: "http://parthenon-fhir-to-cdm:8091"
    parthenon-morpheus:
      loadBalancer:
        servers:
          - url: "http://parthenon-morpheus-ingest:8004"
    # parthenon-grafana: moved to acropolis community compose
    parthenon-hecate:
      loadBalancer:
        servers:
          - url: "http://parthenon-hecate:8080"
    parthenon-blackrabbit:
      loadBalancer:
        servers:
          - url: "http://parthenon-blackrabbit:8090"
    parthenon-solr:
      loadBalancer:
        servers:
          - url: "http://parthenon-solr:8983"
    parthenon-ai:
      loadBalancer:
        servers:
          - url: "http://parthenon-ai:8000"
    parthenon-ws:
      loadBalancer:
        servers:
          - url: "http://parthenon-reverb:8080"
    parthenon-darkstar:
      loadBalancer:
        servers:
          - url: "http://parthenon-darkstar:8787"
    parthenon-parthenon:
      loadBalancer:
        servers:
          - url: "http://parthenon-nginx:80"
    parthenon-jupyter:
      loadBalancer:
        servers:
          - url: "http://parthenon-jupyterhub:8000"
    parthenon-orthanc:
      loadBalancer:
        servers:
          - url: "http://parthenon-orthanc:8042"

  middlewares:
    websocket-headers:
      headers:
        customRequestHeaders:
          Connection: "upgrade"
          Upgrade: "websocket"
