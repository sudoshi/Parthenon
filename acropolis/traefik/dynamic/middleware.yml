# =============================================================================
# Traefik Dynamic Config — Shared Middleware
# =============================================================================

http:
  middlewares:
    # Security headers for all services
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"

    # Rate limiting
    rate-limit:
      rateLimit:
        average: 100
        burst: 200
        period: 1s

    # Compress responses
    compress:
      compress: {}
