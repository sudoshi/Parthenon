# Acropolis Traefik — Internal routing (Apache handles TLS)

api:
  dashboard: true
  insecure: true

ping:
  entryPoint: web

log:
  level: INFO

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: acropolis_network
    watch: true

  file:
    directory: /etc/traefik/dynamic
    watch: true

serversTransport:
  insecureSkipVerify: false
