# =============================================================================
# Acropolis — Enterprise Edition Services
# =============================================================================
# Requires: docker-compose.yml (base) + docker-compose.community.yml
# Includes: n8n, Apache Superset, DataHub, Authentik, Wazuh
#
# License: Commercial license required. See docs/editions.md
# =============================================================================

services:

  # ── n8n — Workflow Automation ─────────────────────────────────────────────
  n8n:
    container_name: acropolis-n8n
    image: n8nio/n8n:2.14.2
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_AUTH_PASSWORD:-changeme}
      - GENERIC_TIMEZONE=${TZ:-America/New_York}
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_PROTOCOL=https
      - N8N_HOST=n8n.${DOMAIN:-acumenus.net}
      - N8N_SECURE_COOKIE=false
      - N8N_EDITOR_BASE_URL=https://n8n.${DOMAIN:-acumenus.net}/
      - WEBHOOK_URL=https://n8n.${DOMAIN:-acumenus.net}/
      - N8N_PROXY_HOPS=1
      - N8N_RESTRICT_ENVIRONMENT_VARIABLES_ACCESS=false
      # Database connection for workflows
      - PGHOST=${DB_HOST:-pgsql.acumenus.net}
      - PGPORT=${DB_PORT:-5432}
      - PGUSER=${DB_USER:-}
      - PGPASSWORD=${DB_PASSWORD:-}
      - PGDATABASE=${DB_NAME:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./config/n8n/workflows:/home/node/workflows
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - acropolis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN:-acumenus.net}`)"
      - "traefik.http.routers.n8n.entrypoints=web"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n.middlewares=authentik@docker"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Apache Superset — BI & Data Visualization ────────────────────────────
  superset-db:
    container_name: acropolis-superset-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset}
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset-cache:
    container_name: acropolis-superset-cache
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - superset_cache_data:/data
    networks:
      - acropolis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    container_name: acropolis-superset
    image: apache/superset:6.0.0
    restart: unless-stopped
    command: >
      bash -c "pip install psycopg2-binary 2>/dev/null; /app/docker/entrypoints/run-server.sh"
    environment:
      - PYTHONPATH=/app/superset_home/.local/lib/python3.10/site-packages
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-CHANGE_ME_TO_A_RANDOM_SECRET}
      - SUPERSET_CONFIG_PATH=/app/superset_config.py
      - DATABASE_HOST=superset-db
      - DATABASE_PORT=5432
      - DATABASE_DB=superset
      - DATABASE_USER=superset
      - DATABASE_PASSWORD=${SUPERSET_DB_PASSWORD:-superset}
      - REDIS_HOST=superset-cache
      - REDIS_PORT=6379
    volumes:
      - superset_home:/app/superset_home
      - ./config/superset/superset_config.py:/app/superset_config.py:ro
      - ./config/superset/requirements-local.txt:/app/docker/requirements-local.txt:ro
    depends_on:
      superset-db:
        condition: service_healthy
      superset-cache:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - acropolis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.superset.rule=Host(`superset.${DOMAIN:-acumenus.net}`)"
      - "traefik.http.routers.superset.entrypoints=web"
      - "traefik.http.services.superset.loadbalancer.server.port=8088"
      - "traefik.http.routers.superset.middlewares=authentik@docker"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  superset-worker:
    container_name: acropolis-superset-worker
    image: apache/superset:6.0.0
    restart: unless-stopped
    command: >
      bash -c "pip install psycopg2-binary 2>/dev/null; celery --app=superset.tasks.celery_app:app worker --pool=prefork -O fair -c 4"
    environment:
      - PYTHONPATH=/app/superset_home/.local/lib/python3.10/site-packages
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-CHANGE_ME_TO_A_RANDOM_SECRET}
      - SUPERSET_CONFIG_PATH=/app/superset_config.py
      - DATABASE_HOST=superset-db
      - DATABASE_PORT=5432
      - DATABASE_DB=superset
      - DATABASE_USER=superset
      - DATABASE_PASSWORD=${SUPERSET_DB_PASSWORD:-superset}
      - REDIS_HOST=superset-cache
      - REDIS_PORT=6379
    volumes:
      - superset_home:/app/superset_home
      - ./config/superset/superset_config.py:/app/superset_config.py:ro
      - ./config/superset/requirements-local.txt:/app/docker/requirements-local.txt:ro
    depends_on:
      superset-db:
        condition: service_healthy
      superset-cache:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  superset-beat:
    container_name: acropolis-superset-beat
    image: apache/superset:6.0.0
    restart: unless-stopped
    command: >
      bash -c "pip install psycopg2-binary 2>/dev/null; celery --app=superset.tasks.celery_app:app beat --pidfile /tmp/celerybeat.pid --schedule /tmp/celerybeat-schedule"
    environment:
      - PYTHONPATH=/app/superset_home/.local/lib/python3.10/site-packages
      - SUPERSET_SECRET_KEY=${SUPERSET_SECRET_KEY:-CHANGE_ME_TO_A_RANDOM_SECRET}
      - SUPERSET_CONFIG_PATH=/app/superset_config.py
      - DATABASE_HOST=superset-db
      - DATABASE_PORT=5432
      - DATABASE_DB=superset
      - DATABASE_USER=superset
      - DATABASE_PASSWORD=${SUPERSET_DB_PASSWORD:-superset}
      - REDIS_HOST=superset-cache
      - REDIS_PORT=6379
    volumes:
      - superset_home:/app/superset_home
      - ./config/superset/superset_config.py:/app/superset_config.py:ro
      - ./config/superset/requirements-local.txt:/app/docker/requirements-local.txt:ro
    depends_on:
      superset-db:
        condition: service_healthy
      superset-cache:
        condition: service_healthy
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── DataHub — Data Catalog & Lineage ─────────────────────────────────────
  datahub-mysql:
    container_name: acropolis-datahub-mysql
    image: mysql:8.4
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_bin --mysql-native-password=ON --authentication-policy=mysql_native_password,*,*
    environment:
      MYSQL_DATABASE: datahub
      MYSQL_USER: datahub
      MYSQL_PASSWORD: ${DATAHUB_MYSQL_PASSWORD:-datahub}
      MYSQL_ROOT_PASSWORD: ${DATAHUB_MYSQL_ROOT_PASSWORD:-datahub}
    volumes:
      - datahub_mysql_data:/var/lib/mysql
    networks:
      - acropolis
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "datahub", "--password=${DATAHUB_MYSQL_PASSWORD:-datahub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  datahub-opensearch:
    container_name: acropolis-datahub-opensearch
    image: opensearchproject/opensearch:2.19.5
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    volumes:
      - datahub_opensearch_data:/usr/share/opensearch/data
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  datahub-broker:
    container_name: acropolis-datahub-broker
    image: confluentinc/cp-kafka:8.1.2
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://datahub-broker:29092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@datahub-broker:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: AcropolisDataHub
    volumes:
      - datahub_broker_data:/var/lib/kafka/data
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  datahub-schema-registry:
    container_name: acropolis-datahub-schema-registry
    image: confluentinc/cp-schema-registry:7.9.2
    restart: unless-stopped
    environment:
      SCHEMA_REGISTRY_HOST_NAME: datahub-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://datahub-broker:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      datahub-broker:
        condition: service_healthy
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  datahub-upgrade:
    container_name: acropolis-datahub-upgrade
    image: acryldata/datahub-upgrade:v1.5.0.1
    command: ["-u", "SystemUpdate"]
    restart: "no"
    environment:
      - DATAHUB_SQL_SETUP_ENABLED=true
      - BACKFILL_BROWSE_PATHS_V2=true
      - EBEAN_DATASOURCE_URL=jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=false&useUnicode=yes&characterEncoding=UTF-8
      - EBEAN_DATASOURCE_USERNAME=datahub
      - EBEAN_DATASOURCE_PASSWORD=${DATAHUB_MYSQL_PASSWORD:-datahub}
      - EBEAN_DATASOURCE_DRIVER=com.mysql.jdbc.Driver
      - EBEAN_DATASOURCE_HOST=datahub-mysql:3306
      - ENTITY_REGISTRY_CONFIG_PATH=/datahub/datahub-gms/resources/entity-registry.yml
      - KAFKA_BOOTSTRAP_SERVER=datahub-broker:29092
      - KAFKA_SCHEMAREGISTRY_URL=http://datahub-schema-registry:8081
      - ELASTICSEARCH_HOST=datahub-opensearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_BUILD_INDICES_CLONE_INDICES=false
      - ELASTICSEARCH_INDEX_BUILDER_MAPPINGS_REINDEX=true
      - ELASTICSEARCH_INDEX_BUILDER_SETTINGS_REINDEX=true
      - GRAPH_SERVICE_IMPL=elasticsearch
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_TOKEN_SERVICE_SIGNING_KEY=${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      - DATAHUB_TOKEN_SERVICE_SALT=${DATAHUB_TOKEN_SERVICE_SALT}
    depends_on:
      datahub-mysql:
        condition: service_healthy
      datahub-opensearch:
        condition: service_healthy
      datahub-broker:
        condition: service_healthy
      datahub-schema-registry:
        condition: service_healthy
    networks:
      - acropolis

  datahub-gms:
    container_name: acropolis-datahub-gms
    image: acryldata/datahub-gms:v1.5.0.1
    restart: unless-stopped
    environment:
      - EBEAN_DATASOURCE_URL=jdbc:mysql://datahub-mysql:3306/datahub?verifyServerCertificate=false&useSSL=false&useUnicode=yes&characterEncoding=UTF-8
      - EBEAN_DATASOURCE_USERNAME=datahub
      - EBEAN_DATASOURCE_PASSWORD=${DATAHUB_MYSQL_PASSWORD:-datahub}
      - EBEAN_DATASOURCE_DRIVER=com.mysql.jdbc.Driver
      - EBEAN_DATASOURCE_HOST=datahub-mysql:3306
      - ENTITY_REGISTRY_CONFIG_PATH=/datahub/datahub-gms/resources/entity-registry.yml
      - KAFKA_BOOTSTRAP_SERVER=datahub-broker:29092
      - KAFKA_SCHEMAREGISTRY_URL=http://datahub-schema-registry:8081
      - ELASTICSEARCH_HOST=datahub-opensearch
      - ELASTICSEARCH_PORT=9200
      - GRAPH_SERVICE_IMPL=elasticsearch
      # Enable Kafka consumers for search indexing
      - MAE_CONSUMER_ENABLED=true
      - MCL_CONSUMER_ENABLED=true
      - PE_CONSUMER_ENABLED=true
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      # Auth hardening
      - METADATA_SERVICE_AUTH_ENABLED=true
      - DATAHUB_TOKEN_SERVICE_SIGNING_KEY=${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      - DATAHUB_TOKEN_SERVICE_SALT=${DATAHUB_TOKEN_SERVICE_SALT}
      # Internal service-to-service auth
      - DATAHUB_SYSTEM_CLIENT_ID=__datahub_system
      - DATAHUB_SYSTEM_CLIENT_SECRET=${DATAHUB_SYSTEM_CLIENT_SECRET}
    depends_on:
      datahub-mysql:
        condition: service_healthy
      datahub-opensearch:
        condition: service_healthy
      datahub-broker:
        condition: service_healthy
      datahub-schema-registry:
        condition: service_healthy
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  datahub-actions:
    container_name: acropolis-datahub-actions
    build:
      context: ./config/datahub
      dockerfile: Dockerfile.actions
    image: acropolis/datahub-actions:v0.1.1-pg
    restart: unless-stopped
    environment:
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_GMS_PROTOCOL=http
      - KAFKA_BOOTSTRAP_SERVER=datahub-broker:29092
      - SCHEMA_REGISTRY_URL=http://datahub-schema-registry:8081
      - METADATA_AUDIT_EVENT_NAME=MetadataAuditEvent_v1
      - DATAHUB_SYSTEM_CLIENT_ID=__datahub_system
      - DATAHUB_SYSTEM_CLIENT_SECRET=${DATAHUB_SYSTEM_CLIENT_SECRET}
      - DATAHUB_ACCESS_TOKEN=${DATAHUB_ACCESS_TOKEN}
      - POSTGRES_PASSWORD=acumenus
    volumes:
      - ./config/datahub/pg_recipe.yml:/etc/datahub/pg_recipe.yml:ro
    depends_on:
      datahub-gms:
        condition: service_healthy
    networks:
      - acropolis

  datahub-frontend:
    container_name: acropolis-datahub-frontend
    image: acryldata/datahub-frontend-react:v1.5.0.1
    restart: unless-stopped
    environment:
      - DATAHUB_GMS_HOST=datahub-gms
      - DATAHUB_GMS_PORT=8080
      - DATAHUB_SECRET=${DATAHUB_SECRET}
      - DATAHUB_APP_VERSION=1.0
      - DATAHUB_PLAY_MEM_BUFFER_SIZE=10MB
      - JAVA_OPTS=-Xms256m -Xmx512m
      - KAFKA_BOOTSTRAP_SERVER=datahub-broker:29092
      - ELASTIC_CLIENT_HOST=datahub-opensearch
      - ELASTIC_CLIENT_PORT=9200
      # Auth hardening — metadata service auth + token signing
      - METADATA_SERVICE_AUTH_ENABLED=true
      - DATAHUB_SYSTEM_CLIENT_ID=__datahub_system
      - DATAHUB_SYSTEM_CLIENT_SECRET=${DATAHUB_SYSTEM_CLIENT_SECRET}
      - DATAHUB_TOKEN_SERVICE_SIGNING_KEY=${DATAHUB_TOKEN_SERVICE_SIGNING_KEY}
      - DATAHUB_TOKEN_SERVICE_SALT=${DATAHUB_TOKEN_SERVICE_SALT}
      # Native login only — Authentik forward auth handles the SSO gate
      - AUTH_OIDC_ENABLED=false
      - AUTH_JAAS_ENABLED=true
      # Theme V2 (required for v1.4+)
      - THEME_V2_ENABLED=true
      - THEME_V2_DEFAULT=true
    ports:
      - "127.0.0.1:9002:9002"
    depends_on:
      datahub-gms:
        condition: service_healthy
    networks:
      - acropolis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.datahub.rule=Host(`datahub.${DOMAIN:-acumenus.net}`)"
      - "traefik.http.routers.datahub.entrypoints=web"
      - "traefik.http.services.datahub.loadbalancer.server.port=9002"
      - "traefik.http.routers.datahub.middlewares=authentik@docker"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9002/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Authentik — SSO / SAML / OIDC Identity Provider ──────────────────────
  authentik-db:
    container_name: acropolis-authentik-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
    volumes:
      - authentik_db_data:/var/lib/postgresql/data
    networks:
      - acropolis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-redis:
    container_name: acropolis-authentik-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    volumes:
      - authentik_redis_data:/data
    networks:
      - acropolis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-server:
    container_name: acropolis-authentik-server
    image: ghcr.io/goauthentik/server:2026.2.1
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-CHANGE_ME_TO_A_RANDOM_SECRET}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
      AUTHENTIK_HOST: https://auth.${DOMAIN:-acumenus.net}
      AUTHENTIK_INSECURE: "false"
      AUTHENTIK_LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-akadmin@acumenus.net}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD}
      AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_BOOTSTRAP_TOKEN}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    ports:
      - "9000:9000"
    networks:
      - acropolis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN:-acumenus.net}`)"
      - "traefik.http.routers.authentik.entrypoints=web"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "traefik.http.middlewares.authentik.forwardauth.address=http://acropolis-authentik-server:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import sys, urllib.request; urllib.request.urlopen('http://localhost:9000/-/health/live/'); sys.exit(0)\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  authentik-worker:
    container_name: acropolis-authentik-worker
    image: ghcr.io/goauthentik/server:2026.2.1
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-CHANGE_ME_TO_A_RANDOM_SECRET}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
      AUTHENTIK_HOST: https://auth.${DOMAIN:-acumenus.net}
      AUTHENTIK_INSECURE: "false"
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    depends_on:
      authentik-db:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - acropolis

  # ── Wazuh — Security Monitoring / SIEM / XDR ────────────────────────────
  wazuh-manager:
    container_name: acropolis-wazuh-manager
    image: wazuh/wazuh-manager:4.14.4
    hostname: wazuh.manager
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD:-SecretPassword}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${WAZUH_API_PASSWORD:-MyS3cr37P450r.*-}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/wazuh/certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./config/wazuh/certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:ro
      - ./config/wazuh/certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key:ro
      - ./config/wazuh/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./config/wazuh/wazuh_cluster/authd.pass:/var/ossec/etc/authd.pass:ro
      - ./config/wazuh/wazuh_cluster/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./config/wazuh/wazuh_cluster/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml:ro
      - ./config/wazuh/wazuh_cluster/agent.conf:/var/ossec/etc/shared/default/agent.conf:ro
      - ./config/wazuh/wazuh_cluster/api.yaml:/var/ossec/api/configuration/api.yaml
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    networks:
      acropolis:
        aliases:
          - wazuh.manager
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:55000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  wazuh-indexer:
    container_name: acropolis-wazuh-indexer
    image: wazuh/wazuh-indexer:4.14.4
    hostname: wazuh.indexer
    restart: unless-stopped
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./config/wazuh/certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem:ro
      - ./config/wazuh/certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key:ro
      - ./config/wazuh/certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem:ro
      - ./config/wazuh/certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem:ro
      - ./config/wazuh/certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem:ro
      - ./config/wazuh/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml:ro
      - ./config/wazuh/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml:ro
      - ./config/wazuh/wazuh_indexer/config.yml:/usr/share/wazuh-indexer/config/opensearch-security/config.yml:ro
      - ./config/wazuh/wazuh_indexer/roles_mapping.yml:/usr/share/wazuh-indexer/config/opensearch-security/roles_mapping.yml:ro
    networks:
      acropolis:
        aliases:
          - wazuh.indexer
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:${WAZUH_INDEXER_PASSWORD:-SecretPassword} https://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  wazuh-dashboard:
    container_name: acropolis-wazuh-dashboard
    image: wazuh/wazuh-dashboard:4.14.4
    hostname: wazuh.dashboard
    restart: unless-stopped
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD:-SecretPassword}
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=${WAZUH_DASHBOARD_PASSWORD:-kibanaserver}
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=${WAZUH_API_PASSWORD:-MyS3cr37P450r.*-}
    volumes:
      - ./config/wazuh/certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh.dashboard.pem:ro
      - ./config/wazuh/certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh.dashboard-key.pem:ro
      - ./config/wazuh/certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./config/wazuh/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./config/wazuh/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    networks:
      acropolis:
        aliases:
          - wazuh.dashboard
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wazuh.rule=Host(`wazuh.${DOMAIN:-acumenus.net}`)"
      - "traefik.http.routers.wazuh.entrypoints=web"
      - "traefik.http.services.wazuh.loadbalancer.server.port=5601"
      - "traefik.http.services.wazuh.loadbalancer.server.scheme=https"
      - "traefik.http.services.wazuh.loadbalancer.serversTransport=insecureTransport@file"
      - "traefik.http.routers.wazuh.middlewares=authentik@docker"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:${WAZUH_INDEXER_PASSWORD:-SecretPassword} https://localhost:5601/api/status >/dev/null 2>&1 || curl -sk https://localhost:5601 -o /dev/null -w '%{http_code}' | grep -q '[23]' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

