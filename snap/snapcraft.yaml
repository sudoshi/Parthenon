name: parthenon-installer
base: core22
version: '1.0.3'
summary: Acropolis installer for Parthenon outcomes research platform
description: |
  One-command setup for Parthenon, the unified OHDSI outcomes research
  platform on OMOP CDM v5.4. Handles Docker setup, repository cloning,
  and guided configuration through a web-based wizard.

  After installation, run: parthenon-install
grade: stable
confinement: classic

apps:
  parthenon-install:
    command: bin/parthenon-install

parts:
  installer:
    plugin: python
    source: .
    build-packages:
      - python3-dev
    python-requirements:
      - requirements-installer.txt
    override-build: |
      # Create a minimal requirements file for the installer
      echo "rich>=13.0" > ${CRAFT_PART_SRC}/requirements-installer.txt
      echo "questionary>=2.0" >> ${CRAFT_PART_SRC}/requirements-installer.txt
      craftctl default
      # Create the entry point script
      mkdir -p ${CRAFT_PART_INSTALL}/bin
      cat > ${CRAFT_PART_INSTALL}/bin/parthenon-install << 'EOF'
      #!/usr/bin/env python3
      import sys, os
      sys.path.insert(0, os.path.join(os.path.dirname(__file__), '..', 'lib', 'python3', 'dist-packages'))
      from installer.bootstrap_remote import main
      main()
      EOF
      chmod +x ${CRAFT_PART_INSTALL}/bin/parthenon-install
    stage:
      - bin/parthenon-install
      - lib/
      - usr/
