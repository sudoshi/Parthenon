name: parthenon-installer
base: core22
version: '1.0.3'
summary: Acropolis installer for Parthenon outcomes research platform
description: |
  One-command setup for Parthenon, the unified OHDSI outcomes research
  platform on OMOP CDM v5.4. Handles Docker setup, repository cloning,
  and guided configuration through a web-based wizard.

  After installation, run: parthenon-install
grade: stable
confinement: classic

apps:
  parthenon-install:
    command: bin/parthenon-install

parts:
  installer:
    plugin: nil
    build-packages:
      - python3
      - python3-pip
    override-build: |
      mkdir -p ${CRAFT_PART_INSTALL}/bin
      mkdir -p ${CRAFT_PART_INSTALL}/lib/parthenon

      # Copy installer package
      cp -r ${CRAFT_PART_SRC}/installer ${CRAFT_PART_INSTALL}/lib/parthenon/
      cp ${CRAFT_PART_SRC}/install.py ${CRAFT_PART_INSTALL}/lib/parthenon/

      # Install Python dependencies
      python3 -m pip install --target=${CRAFT_PART_INSTALL}/lib/parthenon/deps rich questionary

      # Create entry point
      cat > ${CRAFT_PART_INSTALL}/bin/parthenon-install << 'EOF'
#!/usr/bin/env python3
import sys, os
base = os.path.join(os.path.dirname(os.path.realpath(__file__)), '..', 'lib', 'parthenon')
sys.path.insert(0, os.path.join(base, 'deps'))
sys.path.insert(0, base)
from installer.bootstrap_remote import main
main()
EOF
      chmod +x ${CRAFT_PART_INSTALL}/bin/parthenon-install
    stage:
      - bin/
      - lib/
