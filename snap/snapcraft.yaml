name: parthenon-installer
base: core22
version: '1.0.3'
summary: Acropolis installer for Parthenon outcomes research platform
description: |
  One-command setup for Parthenon, the unified OHDSI outcomes research
  platform on OMOP CDM v5.4. Handles Docker setup, repository cloning,
  and guided configuration through a web-based wizard.

  After installation, run: parthenon-install
grade: stable
confinement: classic

apps:
  parthenon-install:
    command: bin/parthenon-install

parts:
  installer:
    plugin: dump
    source: .
    source-type: local
    organize:
      installer/*: lib/parthenon/installer/
      install.py: lib/parthenon/install.py
    override-prime: |
      craftctl default
      mkdir -p bin
      pip install --target=lib/parthenon/deps rich questionary 2>/dev/null || python3 -m pip install --target=lib/parthenon/deps rich questionary --break-system-packages
      printf '#!/usr/bin/env python3\nimport sys, os\nbase = os.path.join(os.path.dirname(os.path.realpath(__file__)), "..", "lib", "parthenon")\nsys.path.insert(0, os.path.join(base, "deps"))\nsys.path.insert(0, base)\nfrom installer.bootstrap_remote import main\nmain()\n' > bin/parthenon-install
      chmod +x bin/parthenon-install
    stage:
      - lib/parthenon/
      - bin/
