name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: parthenon_test
          POSTGRES_USER: parthenon
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U parthenon"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Create schemas and extensions
        env:
          PGPASSWORD: secret
        run: |
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS app;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS vocab;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS cdm;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS achilles_results;"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, redis, bcmath, intl, mbstring, pcntl, zip
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-interaction

      - name: Copy env
        working-directory: backend
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pint (code style)
        working-directory: backend
        run: ./vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        working-directory: backend
        run: ./vendor/bin/phpstan analyse

      - name: Run Pest (tests)
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: parthenon_test
          DB_USERNAME: parthenon
          DB_PASSWORD: secret
          DB_SEARCH_PATH: app,public
          CDM_DB_HOST: 127.0.0.1
          CDM_DB_DATABASE: parthenon_test
          CDM_DB_SEARCH_PATH: cdm,public
          DB_VOCAB_HOST: 127.0.0.1
          DB_VOCAB_DATABASE: parthenon_test
          VOCAB_DB_SEARCH_PATH: vocab,public
          RESULTS_DB_HOST: 127.0.0.1
          RESULTS_DB_DATABASE: parthenon_test
          RESULTS_DB_SEARCH_PATH: achilles_results,public
          REDIS_HOST: 127.0.0.1
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate --force && php artisan test

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build

  ai:
    name: AI Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/requirements*.txt

      - name: Install dependencies
        working-directory: ai
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Type check (mypy)
        working-directory: ai
        run: mypy app/

      - name: Test (pytest)
        working-directory: ai
        run: pytest

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend, frontend, ai]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PHP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: false
          tags: parthenon-php:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node/Dockerfile
          push: false
          tags: parthenon-node:test

      - name: Build Python image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/python/Dockerfile
          push: false
          tags: parthenon-ai:test

      - name: Build R image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/r/Dockerfile
          push: false
          tags: parthenon-r:test
