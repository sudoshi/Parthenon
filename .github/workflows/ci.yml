name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: parthenon_test
          POSTGRES_USER: parthenon
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U parthenon"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Create schemas and extensions
        env:
          PGPASSWORD: secret
        run: |
          # Setup extensions and schemas on the migration database
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS app;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS php;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS omop;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS results;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS gis;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS eunomia;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS inpatient;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS inpatient_ext;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS eunomia_results;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS vocab;"
          # Pest tests use pgsql_testing connection → parthenon_testing database (phpunit.xml)
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE DATABASE parthenon_testing OWNER parthenon;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_testing -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_testing -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_testing -c "CREATE SCHEMA IF NOT EXISTS app;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_testing -c "CREATE SCHEMA IF NOT EXISTS php;"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, redis, bcmath, intl, mbstring, pcntl, zip
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-interaction

      - name: Copy env
        working-directory: backend
        run: cp .env.example .env && php artisan key:generate

      - name: Run Pint (code style)
        working-directory: backend
        run: ./vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        working-directory: backend
        run: ./vendor/bin/phpstan analyse

      - name: Run Pest (tests)
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: parthenon_test
          DB_USERNAME: parthenon
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate --force && php artisan test

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npx vitest run

      - name: Build
        working-directory: frontend
        run: npm run build

  ai:
    name: AI Service (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/requirements*.txt

      - name: Install dependencies
        working-directory: ai
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Type check (mypy)
        working-directory: ai
        run: mypy app/

      - name: Test (pytest)
        working-directory: ai
        run: pytest

  docs-build:
    name: Documentation (Docusaurus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: docs/site
        run: npm run build

  openapi-export:
    name: OpenAPI Spec (Scribe)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: parthenon_test
          POSTGRES_USER: parthenon
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U parthenon"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Create schemas
        env:
          PGPASSWORD: secret
        run: |
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS app;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS php;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS omop;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS results;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS gis;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS eunomia;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS inpatient;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS inpatient_ext;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS eunomia_results;"
          psql -h 127.0.0.1 -U parthenon -d parthenon_test -c "CREATE SCHEMA IF NOT EXISTS vocab;"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, redis, bcmath, intl, mbstring, pcntl, zip
          coverage: none

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-interaction

      - name: Copy env
        working-directory: backend
        run: cp .env.example .env && php artisan key:generate

      - name: Export OpenAPI spec with Scribe
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: parthenon_test
          DB_USERNAME: parthenon
          DB_PASSWORD: secret
          DB_SEARCH_PATH: app,public
        run: |
          php artisan scribe:generate --no-interaction || true
          if [ -f public/docs/openapi.yaml ]; then
            cp public/docs/openapi.yaml api.json
            echo "OpenAPI spec exported"
          else
            echo '{"paths":{}}' > api.json
            echo "Scribe did not produce openapi.yaml — skipping validation"
          fi

      - name: Validate OpenAPI spec
        working-directory: backend
        run: |
          python3 -c "
          import json, yaml, sys
          fname = 'api.json'
          with open(fname) as f:
              content = f.read()
          try:
              spec = json.loads(content)
          except json.JSONDecodeError:
              spec = yaml.safe_load(content) if 'yaml' in dir(__import__('yaml')) else {}
          paths = len(spec.get('paths', {}))
          print(f'Paths: {paths}')
          if paths == 0:
              print('WARN: no paths found — spec may not have been generated')
          else:
              print('Spec valid.')
          "

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Generate TypeScript types
        working-directory: frontend
        run: npm run generate:api-types

      - name: Detect OpenAPI type drift
        run: |
          # Fail if the freshly-regenerated api.generated.ts differs from
          # what's committed. Contributors must run ./deploy.sh --openapi
          # whenever backend routes/requests/responses change.
          if ! git diff --exit-code -- frontend/src/types/api.generated.ts; then
            echo ""
            echo "::error::OpenAPI type drift detected — frontend/src/types/api.generated.ts is out of sync with the backend OpenAPI spec."
            echo ""
            echo "The committed TypeScript types do not match what would be generated from the current backend routes."
            echo "This means a backend route/request/response was changed without regenerating the frontend types."
            echo ""
            echo "To fix locally:"
            echo "  ./deploy.sh --openapi"
            echo "  git add frontend/src/types/api.generated.ts backend/api.json"
            echo "  git commit -m 'chore: regenerate OpenAPI types'"
            echo ""
            echo "Unified diff of the drift is shown above."
            exit 1
          fi
          echo "OpenAPI types are in sync with the backend spec."

      - name: Verify TypeScript types compile
        working-directory: frontend
        run: npx tsc --noEmit
