name: Claude Fix Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    name: Diagnose & Fix Issue
    runs-on: ubuntu-latest
    if: github.event.label.name == 'claude-fix'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up branch
        run: |
          BRANCH="fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_ENV"

      - name: Acknowledge issue
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '🤖 **Claude Fix Agent** is working on this issue. I\'ll open a PR when the fix is ready (usually 5–15 minutes).'
            });

      - name: Fix with Claude Code
        id: fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are fixing a bug in the Parthenon project. Read CLAUDE.md for project context.

            ## Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            ## Instructions

            1. Understand the issue by reading the relevant source files
            2. Identify the root cause
            3. Implement the fix — make the minimum changes needed
            4. Run the relevant linters and tests to verify:
               - PHP: `cd backend && vendor/bin/pint --test && vendor/bin/phpstan analyse`
               - JS/TS: `cd frontend && npx tsc --noEmit && npx eslint .`
               - Python: `cd ai && mypy app/`
            5. If linters fail, fix those too
            6. Commit your changes with a message like: `fix: brief description (closes #${{ github.event.issue.number }})`

            Do NOT create a PR — the workflow will handle that.
            Do NOT make unrelated changes.
            Make sure all changes are committed before you finish.

      - name: Push branch
        run: |
          git config user.name "claude-fix-bot"
          git config user.email "claude-fix-bot@users.noreply.github.com"

          # Check if there are any commits on this branch beyond main
          if git log --oneline main..HEAD | grep -q .; then
            git push origin "$branch"
            echo "pushed=true" >> "$GITHUB_ENV"
          else
            echo "No changes were committed — nothing to push"
            echo "pushed=false" >> "$GITHUB_ENV"
          fi

      - name: Create Pull Request
        if: env.pushed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const branch = process.env.branch;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `fix: ${issue.title}`,
              head: branch,
              base: 'main',
              body: `## Summary\n\nAutomated fix for #${issue.number}.\n\n## Original Issue\n\n> ${issue.title}\n>\n> ${(issue.body || '').substring(0, 500)}\n\n## Review Checklist\n\n- [ ] Fix addresses the reported issue\n- [ ] No unrelated changes included\n- [ ] Linters and tests pass\n\n---\n*Generated by the Claude Fix Agent*`,
              draft: false
            });

            // Comment on the original issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `✅ **Fix ready for review:** PR #${pr.number}\n\n${pr.html_url}`
            });

      - name: Comment if no fix
        if: env.pushed != 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '⚠️ **Claude Fix Agent** analyzed this issue but could not produce a fix automatically. This may need manual investigation.\n\nThe agent\'s analysis is in the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
            });
