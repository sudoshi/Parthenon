name: Build Installer Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v1.0.4)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  pyinstaller:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            suffix: linux
            ext: ""
          - os: windows-2022
            suffix: win
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        working-directory: installer
        run: pyinstaller acropolis-install.spec

      - name: Rename binary
        working-directory: installer/dist
        run: mv acropolis-install${{ matrix.ext }} acropolis-install-${{ matrix.suffix }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: acropolis-install-${{ matrix.suffix }}
          path: installer/dist/acropolis-install-${{ matrix.suffix }}${{ matrix.ext }}

  cosmo:
    name: Cosmopolitan APE (universal)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build APE binary
        run: python3 installer/build_cosmo.py -o dist/acropolis-install.com

      - name: Verify APE
        run: |
          ls -lh dist/acropolis-install.com
          file dist/acropolis-install.com
          # Verify the zip contents include the installer package
          unzip -l dist/acropolis-install.com | grep "installer/" | head -5
          echo "APE binary built and verified."

      - uses: actions/upload-artifact@v4
        with:
          name: acropolis-install-cosmo
          path: dist/acropolis-install.com

  release:
    needs: [pyinstaller, cosmo]
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          # Copy whichever platform binaries were built (some may be missing)
          for name in acropolis-install-linux acropolis-install-cosmo acropolis-install-win; do
            if [ -d "artifacts/${name}" ]; then
              cp artifacts/${name}/* release-assets/
              echo "Collected: ${name}"
            else
              echo "Skipped (not built): ${name}"
            fi
          done
          cp installer/install.sh release-assets/
          ls -lh release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.sha256

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: release-assets/*
