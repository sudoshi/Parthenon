name: Source Installer Release Check

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to validate (tag, branch, or commit)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  source-installer-check:
    name: Source installer smoke test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate source bootstrap scripts
        run: |
          sh -n installer/install.sh
          sh -n frontend/public/install.sh
          cmp installer/install.sh frontend/public/install.sh

      - name: Validate Python installer entry points
        run: |
          python -m py_compile install.py installer/bootstrap_remote.py installer/webapp.py

      - name: Confirm release asset policy
        run: |
          echo "Release downloads are source-only. GitHub provides source archives automatically."
