name: Build Installer Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v1.0.4)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  linux:
    name: Linux installer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        working-directory: installer
        run: pyinstaller acropolis-install.spec

      - name: Create double-clickable package
        run: |
          mkdir -p pkg
          cp installer/dist/acropolis-install pkg/acropolis-install
          chmod +x pkg/acropolis-install
          # Create .desktop file for Linux desktop environments
          cat > pkg/Acropolis-Installer.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Acropolis Installer
          Comment=Install Parthenon — Unified Outcomes Research Platform
          Exec=./acropolis-install
          Terminal=true
          Type=Application
          Categories=Development;
          DESKTOP
          chmod +x pkg/Acropolis-Installer.desktop
          # Package as tar.gz preserving permissions
          cd pkg && tar czf ../acropolis-install-linux.tar.gz *

      - uses: actions/upload-artifact@v7
        with:
          name: acropolis-install-linux
          path: acropolis-install-linux.tar.gz

  macos:
    name: macOS installer (universal)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build Cosmopolitan APE
        run: python3 installer/build_cosmo.py -o dist/acropolis-install.com

      - name: Create .command launcher and .zip
        run: |
          mkdir -p pkg
          cp dist/acropolis-install.com pkg/acropolis-install.com
          chmod +x pkg/acropolis-install.com

          # Create .command file — macOS opens these in Terminal on double-click
          cat > "pkg/Install Parthenon.command" << 'CMD'
          #!/bin/bash
          # Acropolis — Parthenon Installer
          # This file opens in Terminal when double-clicked on macOS.

          DIR="$(cd "$(dirname "$0")" && pwd)"
          BINARY="$DIR/acropolis-install.com"

          # Remove macOS quarantine flag (download protection)
          xattr -d com.apple.quarantine "$BINARY" 2>/dev/null
          chmod +x "$BINARY"

          echo ""
          echo "  ========================================================"
          echo "    Acropolis — Parthenon Remote Installer"
          echo "  ========================================================"
          echo ""

          exec "$BINARY" "$@"
          CMD
          chmod +x "pkg/Install Parthenon.command"

          # Zip preserving permissions and resource forks
          cd pkg && zip -r ../acropolis-install-macos.zip . -x ".*"

      - name: Verify zip contents
        run: unzip -l acropolis-install-macos.zip

      - uses: actions/upload-artifact@v7
        with:
          name: acropolis-install-macos
          path: acropolis-install-macos.zip

  windows:
    name: Windows installer (WSL)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        working-directory: installer
        run: pyinstaller acropolis-install.spec

      - name: Rename binary
        working-directory: installer/dist
        run: mv acropolis-install.exe acropolis-install-win.exe

      - uses: actions/upload-artifact@v7
        with:
          name: acropolis-install-win
          path: installer/dist/acropolis-install-win.exe

  snap:
    name: Snap package
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: snapcore/action-build@v1
        id: snapcraft

      - uses: actions/upload-artifact@v7
        with:
          name: parthenon-snap
          path: ${{ steps.snapcraft.outputs.snap }}

  deb:
    name: Debian package
    needs: [linux]
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: acropolis-install-linux
          path: artifacts

      - name: Extract Linux binary
        run: |
          cd artifacts
          tar xzf acropolis-install-linux.tar.gz

      - name: Install nfpm
        run: |
          NFPM_VERSION="2.41.1"
          curl -sfLo /tmp/nfpm.tar.gz "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          tar xzf /tmp/nfpm.tar.gz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build .deb
        working-directory: installer
        run: |
          cp ../artifacts/acropolis-install .
          nfpm package --config nfpm.yaml --packager deb --target ../parthenon-installer_1.0.3_amd64.deb

      - uses: actions/upload-artifact@v7
        with:
          name: parthenon-deb
          path: parthenon-installer_1.0.3_amd64.deb

  sign-macos:
    name: Sign + notarize macOS
    needs: [macos]
    runs-on: macos-14
    continue-on-error: true
    if: ${{ vars.APPLE_SIGNING_ENABLED == 'true' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: acropolis-install-macos
          path: artifacts

      - name: Unzip macOS package
        run: |
          mkdir -p work
          cd work && unzip ../artifacts/acropolis-install-macos.zip

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm cert.p12

      - name: Sign binary
        run: |
          codesign --sign "Developer ID Application: ${{ vars.APPLE_TEAM_NAME }}" \
            --options runtime --timestamp \
            work/acropolis-install.com

      - name: Create signed .pkg
        run: |
          pkgbuild --root work \
            --identifier io.acumenus.parthenon-installer \
            --version 1.0.3 \
            --install-location /usr/local/bin \
            unsigned.pkg
          productsign --sign "Developer ID Installer: ${{ vars.APPLE_TEAM_NAME }}" \
            unsigned.pkg \
            Parthenon-Installer-1.0.3.pkg
          rm unsigned.pkg

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit Parthenon-Installer-1.0.3.pkg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 10m
          xcrun stapler staple Parthenon-Installer-1.0.3.pkg

      - name: Re-zip signed macOS package
        run: |
          cd work && zip -r ../acropolis-install-macos-signed.zip . -x ".*"

      - uses: actions/upload-artifact@v7
        with:
          name: acropolis-install-macos-signed
          path: |
            acropolis-install-macos-signed.zip
            Parthenon-Installer-1.0.3.pkg

  sign-windows:
    name: Sign Windows exe (SignPath)
    needs: [windows]
    runs-on: ubuntu-22.04
    continue-on-error: true
    if: ${{ vars.SIGNPATH_SIGNING_ENABLED == 'true' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: acropolis-install-win
          path: artifacts

      - name: Submit to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: parthenon-installer
          signing-policy-slug: release-signing
          artifact-configuration-slug: exe-artifact
          input-artifact-path: artifacts/acropolis-install-win.exe
          output-artifact-path: artifacts/acropolis-install-win-signed.exe
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 600

      - uses: actions/upload-artifact@v7
        with:
          name: acropolis-install-win-signed
          path: artifacts/acropolis-install-win-signed.exe

  sign-windows-esigner:
    name: Sign Windows exe (SSL.com eSigner)
    needs: [windows, sign-windows]
    runs-on: windows-2022
    continue-on-error: true
    if: >-
      always()
      && needs.windows.result == 'success'
      && needs.sign-windows.result != 'success'
      && vars.ESIGNER_SIGNING_ENABLED == 'true'
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: acropolis-install-win
          path: artifacts

      - name: Sign with SSL.com eSigner
        uses: sslcom/esigner-codesign@v1
        with:
          command: sign
          username: ${{ secrets.ESIGNER_USERNAME }}
          password: ${{ secrets.ESIGNER_PASSWORD }}
          credential_id: ${{ secrets.ESIGNER_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ESIGNER_TOTP_SECRET }}
          file_path: artifacts/acropolis-install-win.exe
          environment: production

      - uses: actions/upload-artifact@v7
        with:
          name: acropolis-install-win-signed
          path: artifacts/acropolis-install-win.exe

  release:
    needs: [linux, macos, windows, snap, deb, sign-macos, sign-windows, sign-windows-esigner]
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets

          # Prefer signed artifacts when available, fall back to unsigned
          if [ -d "artifacts/acropolis-install-macos-signed" ]; then
            cp artifacts/acropolis-install-macos-signed/* release-assets/
            echo "Collected: macOS (signed + notarized)"
          elif [ -d "artifacts/acropolis-install-macos" ]; then
            cp artifacts/acropolis-install-macos/* release-assets/
            echo "Collected: macOS (unsigned)"
          fi

          if [ -d "artifacts/acropolis-install-win-signed" ]; then
            cp artifacts/acropolis-install-win-signed/* release-assets/
            echo "Collected: Windows (signed)"
          elif [ -d "artifacts/acropolis-install-win" ]; then
            cp artifacts/acropolis-install-win/* release-assets/
            echo "Collected: Windows (unsigned)"
          fi

          for name in acropolis-install-linux parthenon-snap parthenon-deb; do
            if [ -d "artifacts/${name}" ]; then
              cp artifacts/${name}/* release-assets/
              echo "Collected: ${name}"
            else
              echo "Skipped (not built): ${name}"
            fi
          done
          cp installer/install.sh release-assets/
          ls -lh release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.sha256

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: release-assets/*

  winget:
    name: Submit to Winget
    needs: [release]
    runs-on: windows-2022
    if: >-
      always()
      && needs.release.result == 'success'
      && vars.WINGET_SUBMISSION_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Determine tag and version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          # Strip leading 'v' for Winget version (v1.0.3 -> 1.0.3)
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download Windows exe from release
        shell: bash
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern "acropolis-install-win.exe" \
            --dir artifacts || \
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern "acropolis-install-win-signed.exe" \
            --dir artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256
        id: hash
        shell: pwsh
        run: |
          $exe = Get-ChildItem artifacts/*.exe | Select-Object -First 1
          $hash = (Get-FileHash -Algorithm SHA256 $exe.FullName).Hash
          echo "sha256=$hash" >> $env:GITHUB_OUTPUT
          echo "filename=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile wingetcreate.exe

      - name: Submit Winget manifest
        shell: pwsh
        env:
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $filename = "${{ steps.hash.outputs.filename }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/${tag}/${filename}"

          .\wingetcreate.exe update Acumenus.ParthenonInstaller `
            --version $version `
            --urls $url `
            --submit `
            --token $env:WINGET_GITHUB_TOKEN
