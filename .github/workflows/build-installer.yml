name: Source Installer Release Check

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to validate (tag, branch, or commit)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

jobs:
  source-installer-check:
    name: Source installer smoke test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust GUI system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Validate source bootstrap scripts
        run: |
          sh -n installer/install.sh
          sh -n frontend/public/install.sh
          cmp installer/install.sh frontend/public/install.sh

      - name: Validate Python installer entry points
        run: |
          python -m py_compile install.py installer/bootstrap_remote.py installer/bundle_manifest.py installer/contract.py installer/data_probe.py installer/webapp.py installer/docker_ops.py installer/build_cosmo.py
          python install.py --contract plan --community --contract-redact >/tmp/parthenon-community-contract.json
          python install.py --contract data-check --community --contract-redact >/tmp/parthenon-community-data-check.json
          python install.py --contract bundle-manifest --community --contract-redact >/tmp/parthenon-community-bundle-manifest.json

      - name: Build and verify source-backed installer bundle
        run: |
          mkdir -p dist/installer-bundle
          python -m installer.bundle_manifest --validate --bundle-dir dist/installer-bundle --pretty > dist/installer-bundle/build-result.json
          bundle="$(find dist/installer-bundle -name 'parthenon-community-bootstrap-*.tar.gz' -print -quit)"
          test -n "$bundle"
          mkdir -p /tmp/parthenon-installer-bundle-check
          tar -xzf "$bundle" -C /tmp/parthenon-installer-bundle-check
          python -m installer.bundle_manifest \
            --manifest /tmp/parthenon-installer-bundle-check/installer-bundle-manifest.json \
            --repo-root /tmp/parthenon-installer-bundle-check \
            --validate \
            --pretty > dist/installer-bundle/extracted-validation.json

      - name: Install Python installer test dependencies
        run: python -m pip install --quiet pytest

      - name: Run installer parity tests
        run: python -m pytest installer/tests tests/installer

      - name: Validate Rust installer GUI
        working-directory: installer/rust-gui
        run: |
          cargo fmt --check
          cargo test
          cargo test python_contract_ -- --ignored
          cargo clippy --all-targets -- -D warnings

      - name: Confirm release asset policy
        run: |
          echo "Release downloads include the source-backed installer bundle until the prebuilt-image bundle is ready."

      - name: Upload source-backed installer bundle
        uses: actions/upload-artifact@v7
        with:
          name: parthenon-community-bootstrap-bundle
          if-no-files-found: error
          path: dist/installer-bundle/*
