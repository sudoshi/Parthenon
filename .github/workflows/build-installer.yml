name: Build Installer Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to (e.g. v1.0.4)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  linux:
    name: Linux installer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        working-directory: installer
        run: pyinstaller acropolis-install.spec

      - name: Create double-clickable package
        run: |
          mkdir -p pkg
          cp installer/dist/acropolis-install pkg/acropolis-install
          chmod +x pkg/acropolis-install
          # Create .desktop file for Linux desktop environments
          cat > pkg/Acropolis-Installer.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Acropolis Installer
          Comment=Install Parthenon — Unified Outcomes Research Platform
          Exec=./acropolis-install
          Terminal=true
          Type=Application
          Categories=Development;
          DESKTOP
          chmod +x pkg/Acropolis-Installer.desktop
          # Package as tar.gz preserving permissions
          cd pkg && tar czf ../acropolis-install-linux.tar.gz *

      - uses: actions/upload-artifact@v4
        with:
          name: acropolis-install-linux
          path: acropolis-install-linux.tar.gz

  macos:
    name: macOS installer (universal)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Cosmopolitan APE
        run: python3 installer/build_cosmo.py -o dist/acropolis-install.com

      - name: Create .command launcher and .zip
        run: |
          mkdir -p pkg
          cp dist/acropolis-install.com pkg/acropolis-install.com
          chmod +x pkg/acropolis-install.com

          # Create .command file — macOS opens these in Terminal on double-click
          cat > "pkg/Install Parthenon.command" << 'CMD'
          #!/bin/bash
          # Acropolis — Parthenon Installer
          # This file opens in Terminal when double-clicked on macOS.

          DIR="$(cd "$(dirname "$0")" && pwd)"
          BINARY="$DIR/acropolis-install.com"

          # Remove macOS quarantine flag (download protection)
          xattr -d com.apple.quarantine "$BINARY" 2>/dev/null
          chmod +x "$BINARY"

          echo ""
          echo "  ========================================================"
          echo "    Acropolis — Parthenon Remote Installer"
          echo "  ========================================================"
          echo ""

          exec "$BINARY" "$@"
          CMD
          chmod +x "pkg/Install Parthenon.command"

          # Zip preserving permissions and resource forks
          cd pkg && zip -r ../acropolis-install-macos.zip . -x ".*"

      - name: Verify zip contents
        run: unzip -l acropolis-install-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: acropolis-install-macos
          path: acropolis-install-macos.zip

  windows:
    name: Windows installer (WSL)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        working-directory: installer
        run: pyinstaller acropolis-install.spec

      - name: Rename binary
        working-directory: installer/dist
        run: mv acropolis-install.exe acropolis-install-win.exe

      - uses: actions/upload-artifact@v4
        with:
          name: acropolis-install-win
          path: installer/dist/acropolis-install-win.exe

  snap:
    name: Snap package
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: snapcore/action-build@v1
        id: snapcraft

      - uses: actions/upload-artifact@v4
        with:
          name: parthenon-snap
          path: ${{ steps.snapcraft.outputs.snap }}

  release:
    needs: [linux, macos, windows, snap]
    if: always() && !cancelled()
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          for name in acropolis-install-linux acropolis-install-macos acropolis-install-win parthenon-snap; do
            if [ -d "artifacts/${name}" ]; then
              cp artifacts/${name}/* release-assets/
              echo "Collected: ${name}"
            else
              echo "Skipped (not built): ${name}"
            fi
          done
          cp installer/install.sh release-assets/
          ls -lh release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.sha256

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to GitHub Release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: release-assets/*
