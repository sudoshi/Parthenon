name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'staging',
              auto_merge: false,
              required_contexts: [],
              description: `Deploy ${context.sha.substring(0, 7)} to staging`
            });
            core.setOutput('id', deployment.id);

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH_STAGING }}
            git fetch origin main
            git checkout main
            git pull origin main
            ./deploy.sh --php --frontend --db --docs

      - name: Health check
        id: health
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          MAX_RETRIES=10
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $i/$MAX_RETRIES..."

            # Check main app
            APP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL" --max-time 10 || echo "000")

            # Check API health
            API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/v1/health" --max-time 10 || echo "000")

            echo "  App: $APP_STATUS, API: $API_STATUS"

            if [ "$APP_STATUS" = "200" ] && [ "$API_STATUS" = "200" ]; then
              echo "✅ All health checks passed"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "  Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "❌ Health checks failed after $MAX_RETRIES attempts"
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ steps.health.outputs.healthy }}' === 'true' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: state,
              environment_url: '${{ secrets.STAGING_URL }}',
              description: state === 'success'
                ? 'Staging deploy successful'
                : 'Staging deploy failed health checks'
            });
