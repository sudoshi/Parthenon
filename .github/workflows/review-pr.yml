name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Don't review Dependabot PRs (they're auto-merged)
    branches: [main, master]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    # Skip Dependabot PRs and draft PRs
    if: github.actor != 'dependabot[bot]' && github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- \
            '*.php' '*.ts' '*.tsx' '*.py' '*.sql' '*.yml' '*.yaml' \
            ':!vendor' ':!node_modules' ':!*.lock' ':!*.json' \
            | head -c 50000)
          echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"

          # Count changed files
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- \
            '*.php' '*.ts' '*.tsx' '*.py' | wc -l)
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Review with Claude
        if: steps.diff.outputs.changed_files != '0'
        id: review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            You are reviewing a pull request for the Parthenon project.
            Read the review guidelines in .github/prompts/review-pr.md.

            PR Title: ${{ github.event.pull_request.title }}
            PR Description: ${{ github.event.pull_request.body }}
            Changed files: ${{ steps.diff.outputs.changed_files }}

            Here is the diff:

            ${{ steps.diff.outputs.diff }}

            Review this PR according to the guidelines and provide your assessment.

      - name: Post review comment
        if: steps.diff.outputs.changed_files != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const review = `${{ steps.review.outputs.response }}`;

            // Determine if review approves or requests changes
            const hasBlocking = review.toLowerCase().includes('blocking');
            const verdict = review.toLowerCase().includes('changes_requested')
              ? 'REQUEST_CHANGES'
              : 'COMMENT';

            // Post as a PR review
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: `## 🤖 AI Code Review\n\n${review}\n\n---\n*Reviewed automatically by the Parthenon AI Review Agent*`,
              event: verdict === 'REQUEST_CHANGES' && hasBlocking ? 'REQUEST_CHANGES' : 'COMMENT'
            });

            // Add label
            const label = hasBlocking ? 'review/has-suggestions' : 'review/approved';
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [label]
              });
            } catch (e) {
              // Label may not exist yet — that's fine
              console.log(`Could not add label "${label}": ${e.message}`);
            }
