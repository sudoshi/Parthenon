name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: write

jobs:
  auto-fix:
    name: Diagnose & Auto-Fix
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Download CI failure logs
        id: logs
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;

            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
              filter: 'latest'
            });

            const failedJobs = jobs.jobs.filter(j => j.conclusion === 'failure');
            let allLogs = '';

            for (const job of failedJobs) {
              try {
                const { data: log } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id
                });
                const lines = log.split('\n');
                const tail = lines.slice(-200).join('\n');
                allLogs += `\n--- JOB: ${job.name} (FAILED) ---\n${tail}\n`;
              } catch (e) {
                allLogs += `\n--- JOB: ${job.name} (FAILED) --- [Could not fetch logs]\n`;
              }
            }

            const fs = require('fs');
            fs.writeFileSync('ci-failure-logs.txt', allLogs);

            const failedNames = failedJobs.map(j => j.name).join(', ');
            core.setOutput('failed_jobs', failedNames);
            core.setOutput('has_failures', failedJobs.length > 0 ? 'true' : 'false');

      - name: Read CI failure logs
        if: steps.logs.outputs.has_failures == 'true'
        id: read_logs
        run: |
          {
            echo "CI_FAILURE_LOGS<<EOFMARKER"
            head -c 40000 ci-failure-logs.txt
            echo ""
            echo "EOFMARKER"
          } >> "$GITHUB_ENV"

      - name: Fix CI failures with Claude
        if: steps.logs.outputs.has_failures == 'true'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          prompt: |
            You are the CI auto-fixer for the Parthenon project.

            ## Failed Jobs: ${{ steps.logs.outputs.failed_jobs }}

            ## CI Failure Logs
            ${{ env.CI_FAILURE_LOGS }}

            ## Instructions

            Read the failure logs above and fix ALL errors. Follow these rules strictly:

            ### Pint (PHP code style)
            Run: `cd backend && composer install --no-interaction --quiet && vendor/bin/pint`
            Pint auto-fixes are always safe.

            ### PHPStan (PHP static analysis)
            - For new errors from new code: fix the actual type issues in the source.
            - For baseline drift: run `cd backend && vendor/bin/phpstan analyse --generate-baseline`
            - Check `backend/phpstan.neon` for existing identifier ignores before adding new ones.

            ### ESLint (JS/TS linting)
            Run: `cd frontend && npm ci --legacy-peer-deps --silent && npx eslint . --fix`
            Then fix any remaining errors that can't be auto-fixed.

            ### TypeScript Build Errors (tsc -b / vite build)
            - TS6133/TS6196 (unused): Remove the unused import/variable
            - TS2304 (cannot find name): Add the missing import — search the codebase for where the type is defined
            - TS2339 (property does not exist): Add property to interface or fix access
            - TS7006 (implicit any): Add type annotation
            - TS18048 (possibly undefined): Add null guard
            - TS2345 (type mismatch): Fix the type or add proper casting
            Install deps first: `cd frontend && npm ci --legacy-peer-deps --silent`

            ### mypy (Python type checking)
            - Add type annotations where missing
            - Use `Any` for dynamic types from third-party libraries
            - Do NOT use `# type: ignore`

            ### pytest / Pest (tests)
            - Investigate why the test fails — fix the implementation, not the test
            - Check for dependency conflicts in requirements files

            ## After Fixing
            Verify fixes locally:
            - Backend: `cd backend && vendor/bin/pint --test && vendor/bin/phpstan analyse`
            - Frontend: `cd frontend && npx tsc -b`
            - AI: `cd ai && pip install -r requirements.txt -r requirements-dev.txt --quiet && mypy app/`

            Only run the checks relevant to the failed jobs.

            ## Rules
            - Fix the code, not the linter config — don't add ignores unless it's a genuine false positive
            - Never modify test expectations to make tests pass
            - Preserve existing code patterns and conventions
            - Do NOT create new files unless absolutely necessary
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep,MultiEdit"
          timeout_minutes: 15

      - name: Commit and push fixes
        run: |
          git config user.name "ci-fix-bot"
          git config user.email "ci-fix-bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: auto-fix CI failures (${{ steps.logs.outputs.failed_jobs }})

          Triggered by CI run #${{ github.event.workflow_run.id }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
            git push origin ${{ github.event.workflow_run.head_branch }}
            echo "Auto-fix committed and pushed. CI will re-run."
          fi
