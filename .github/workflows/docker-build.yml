# Build and push Docker images to GitHub Container Registry (GHCR)
#
# Triggers:
#   - Push to main (builds all images whose Docker inputs changed)
#   - Manual dispatch (builds all images or a specific one)
#
# Images are tagged with: latest, sha-<short>, and date-based tags.
# BuildKit layer caching via GitHub Actions cache keeps rebuilds fast.

name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'backend/**'
      - 'frontend/**'
      - 'ai/**'
      - 'blackrabbit/**'
      - 'solr/**'
      - '.github/workflows/docker-build.yml'
      # Dependency files — rebuild base images when deps change
      - 'backend/composer.json'
      - 'backend/composer.lock'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'ai/requirements.txt'
      - 'ai/requirements-dev.txt'
  # Weekly rebuild (Sunday 4am UTC) — picks up base image security patches
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      image:
        description: 'Specific image to build (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - nginx
          - php
          - node
          - postgres
          - solr
          - python-ai
          - study-agent
          - jupyterhub
          - jupyter-user
          - darkstar
          - hecate
          - blackrabbit
          - fhir-to-cdm
          - ohif-build

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/sudoshi/parthenon

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Determine which images need building based on changed files
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed Docker inputs
        id: set-matrix
        run: |
          # If manual dispatch with specific image, build just that one
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.image }}" != "all" && -n "${{ inputs.image }}" ]]; then
            SINGLE=$(jq -nc --arg name "${{ inputs.image }}" '{include: [{name: $name}]}')
            echo "matrix=${SINGLE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For push events, check which Docker inputs changed; for dispatch "all", build everything
          IMAGES='[]'

          IMAGE_NAMES=(
            nginx
            php
            node
            postgres
            solr
            python-ai
            study-agent
            jupyterhub
            jupyter-user
            darkstar
            hecate
            blackrabbit
            fhir-to-cdm
            ohif-build
          )

          declare -A WATCH_PATHS=(
            [nginx]="docker/nginx frontend docs/site docs/blog backend/public/docs/openapi.yaml"
            [php]="docker/php backend"
            [node]="docker/node frontend"
            [postgres]="docker/postgres"
            [solr]="docker/solr solr/configsets"
            [python-ai]="docker/python ai backend/resources/help docs GIS OHDSI-scraper scripts"
            [study-agent]="docker/study-agent study-agent"
            [jupyterhub]="docker/jupyterhub"
            [jupyter-user]="docker/jupyter-user"
            [darkstar]="docker/r darkstar"
            [hecate]="docker/hecate"
            [blackrabbit]="docker/blackrabbit blackrabbit"
            [fhir-to-cdm]="docker/fhir-to-cdm"
            [ohif-build]="docker/ohif"
          )

          add_image() {
            local image="$1"
            IMAGES=$(echo "$IMAGES" | jq -c --arg n "$image" 'if any(.name == $n) then . else . + [{name: $n}] end')
          }

          path_changed() {
            local candidate watch
            for watch in "$@"; do
              while IFS= read -r candidate; do
                [[ -z "$candidate" ]] && continue
                if [[ "$candidate" == "$watch" || "$candidate" == "$watch"/* ]]; then
                  return 0
                fi
              done <<< "$CHANGED"
            done
            return 1
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            # Build all images on manual dispatch or weekly schedule
            for name in "${IMAGE_NAMES[@]}"; do
              add_image "$name"
            done
          else
            # Only build images whose Dockerfiles, service code, or dependency files changed.
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]] || ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              CHANGED=$(git diff --name-only "${AFTER}^" "$AFTER")
            else
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")
            fi

            if path_changed ".github/workflows/docker-build.yml"; then
              for name in "${IMAGE_NAMES[@]}"; do
                add_image "$name"
              done
            else
              for name in "${IMAGE_NAMES[@]}"; do
                read -r -a paths <<< "${WATCH_PATHS[$name]}"
                if path_changed "${paths[@]}"; then
                  add_image "$name"
                fi
              done

              # Dependency file changes trigger specific image rebuilds.
              if path_changed "backend/composer.json" "backend/composer.lock"; then
                add_image "php"
              fi
              if path_changed "frontend/package.json" "frontend/package-lock.json"; then
                add_image "nginx"
                add_image "node"
              fi
              if path_changed "ai/requirements.txt" "ai/requirements-dev.txt"; then
                add_image "python-ai"
              fi
            fi
          fi

          if [[ $(echo "$IMAGES" | jq -r length) -eq 0 ]]; then
            echo "No Docker inputs changed — skipping builds"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            MATRIX=$(echo "$IMAGES" | jq -c '{include: .}')
            echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          fi

      - name: Show build matrix
        run: echo "${{ steps.set-matrix.outputs.matrix }}"

  # ---------------------------------------------------------------------------
  # Build and push each image in parallel
  # ---------------------------------------------------------------------------
  build:
    needs: changes
    if: ${{ fromJson(needs.changes.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set image metadata
        id: meta
        run: |
          NAME="${{ matrix.name }}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE_TAG=$(date +%Y%m%d)

          # Map image name to Dockerfile path and build context
          case "$NAME" in
            nginx)           DOCKERFILE="docker/nginx/Dockerfile";         CONTEXT="." ;;
            php)              DOCKERFILE="docker/php/Dockerfile";           CONTEXT="." ;;
            node)             DOCKERFILE="docker/node/Dockerfile";          CONTEXT="." ;;
            postgres)         DOCKERFILE="docker/postgres/Dockerfile";      CONTEXT="." ;;
            solr)             DOCKERFILE="docker/solr/Dockerfile";          CONTEXT="." ;;
            python-ai)        DOCKERFILE="docker/python/Dockerfile";        CONTEXT="." ;;
            study-agent)      DOCKERFILE="docker/study-agent/Dockerfile";   CONTEXT="." ;;
            jupyterhub)       DOCKERFILE="docker/jupyterhub/Dockerfile";    CONTEXT="." ;;
            jupyter-user)     DOCKERFILE="docker/jupyter-user/Dockerfile";  CONTEXT="." ;;
            darkstar)         DOCKERFILE="docker/r/Dockerfile";             CONTEXT="." ;;
            hecate)           DOCKERFILE="docker/hecate/Dockerfile";        CONTEXT="." ;;
            blackrabbit)      DOCKERFILE="docker/blackrabbit/Dockerfile";   CONTEXT="." ;;
            fhir-to-cdm)      DOCKERFILE="docker/fhir-to-cdm/Dockerfile";  CONTEXT="." ;;
            ohif-build)       DOCKERFILE="./docker/ohif/Dockerfile";        CONTEXT="./docker/ohif" ;;
            *) echo "Unknown image: $NAME"; exit 1 ;;
          esac

          if [[ ! -f "$DOCKERFILE" ]]; then
            echo "::error::Dockerfile not found for $NAME: $DOCKERFILE"
            exit 1
          fi
          if [[ ! -d "$CONTEXT" ]]; then
            echo "::error::Docker build context not found for $NAME: $CONTEXT"
            exit 1
          fi

          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"
          echo "context=$CONTEXT" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_PREFIX }}-${NAME}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ env.IMAGE_PREFIX }}-${NAME}:latest" >> "$GITHUB_OUTPUT"
          echo "${{ env.IMAGE_PREFIX }}-${NAME}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "${{ env.IMAGE_PREFIX }}-${NAME}:${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.meta.outputs.context }}
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          labels: |
            org.opencontainers.image.source=https://github.com/sudoshi/Parthenon
            org.opencontainers.image.revision=${{ github.sha }}
