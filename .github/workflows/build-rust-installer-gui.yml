name: Rust Installer GUI Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit)"
        required: false
        default: "main"
        type: string
  pull_request:
    paths:
      - ".github/workflows/build-rust-installer-gui.yml"
      - "install.py"
      - "installer/contract.py"
      - "installer/docker_ops.py"
      - "installer/preflight.py"
      - "installer/config.py"
      - "installer/rust-gui/**"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-22.04
            artifact: parthenon-installer-linux-x64
            smoke_contract: true
          - label: macos-x64
            runner: macos-15-intel
            artifact: parthenon-installer-macos-x64
            smoke_contract: true
          - label: macos-arm64
            runner: macos-15
            artifact: parthenon-installer-macos-arm64
            smoke_contract: true
          - label: windows-x64
            runner: windows-2022
            artifact: parthenon-installer-windows-x64
            smoke_contract: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Python contract dependencies
        run: python -m pip install --quiet rich questionary

      - name: Validate Python installer contract
        shell: bash
        run: |
          python -m py_compile install.py installer/contract.py installer/data_probe.py installer/webapp.py installer/docker_ops.py
          python install.py --contract validate --community --contract-redact --contract-pretty
          python install.py --contract plan --community --contract-redact --contract-pretty >/dev/null
          python install.py --contract data-check --community --contract-redact --contract-pretty >/dev/null

      - name: Validate Rust GUI
        working-directory: installer/rust-gui
        shell: bash
        run: |
          cargo fmt --check
          cargo test
          if [ "${{ matrix.smoke_contract }}" = "true" ]; then
            cargo test python_contract_ -- --ignored
          fi
          cargo clippy --all-targets -- -D warnings

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Tauri bundle
        working-directory: installer/rust-gui
        run: cargo tauri build

      - name: List generated bundles
        working-directory: installer/rust-gui
        shell: bash
        run: find target/release/bundle -maxdepth 4 -type f -print | sort

      - name: Package Linux bundles
        if: runner.os == 'Linux'
        working-directory: installer/rust-gui
        run: |
          mkdir -p dist-artifacts
          tar -C target/release -czf "dist-artifacts/${{ matrix.artifact }}.tar.gz" bundle

      - name: Package macOS bundles
        if: runner.os == 'macOS'
        working-directory: installer/rust-gui
        run: |
          mkdir -p dist-artifacts
          ditto -c -k --sequesterRsrc --keepParent target/release/bundle "dist-artifacts/${{ matrix.artifact }}.zip"

      - name: Package Windows bundles
        if: runner.os == 'Windows'
        working-directory: installer/rust-gui
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path target/release/bundle/* -DestinationPath "dist-artifacts/${{ matrix.artifact }}.zip" -Force

      - name: Upload installer packages
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          compression-level: 0
          path: installer/rust-gui/dist-artifacts/*
