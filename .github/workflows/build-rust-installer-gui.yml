name: Rust Installer GUI Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit)"
        required: false
        default: "main"
        type: string
  pull_request:
    paths:
      - ".github/workflows/build-rust-installer-gui.yml"
      - ".env.example"
      - "backend/.env.example"
      - "docker-compose.community.yml"
      - "docker-compose.yml"
      - "docker/**"
      - "frontend/.env.example"
      - "install.py"
      - "installer/*.py"
      - "installer/contract.py"
      - "installer/docker_ops.py"
      - "installer/installer_manifest.json"
      - "installer/preflight.py"
      - "installer/config.py"
      - "installer/web/**"
      - "installer/rust-gui/**"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  installer-bundle:
    name: Build installer bundle
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and verify source-backed bundle
        shell: bash
        run: |
          mkdir -p dist/installer-bundle
          python -m installer.bundle_manifest --validate --bundle-dir dist/installer-bundle --pretty > dist/installer-bundle/build-result.json
          bundle="$(find dist/installer-bundle -name 'parthenon-community-bootstrap-*.tar.gz' -print -quit)"
          test -n "$bundle"
          mkdir -p /tmp/parthenon-installer-bundle-check
          tar -xzf "$bundle" -C /tmp/parthenon-installer-bundle-check
          python -m installer.bundle_manifest \
            --manifest /tmp/parthenon-installer-bundle-check/installer-bundle-manifest.json \
            --repo-root /tmp/parthenon-installer-bundle-check \
            --validate \
            --pretty > dist/installer-bundle/extracted-validation.json

      - name: Install Python installer test dependencies
        run: python -m pip install --quiet pytest rich psycopg2-binary requests docker keyring

      - name: Run installer parity tests
        run: python -m pytest installer/tests tests/installer

      - name: Upload source-backed installer bundle
        uses: actions/upload-artifact@v4
        with:
          name: parthenon-community-bootstrap-bundle
          if-no-files-found: error
          path: dist/installer-bundle/*

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-22.04
            artifact: parthenon-installer-linux-x64
            smoke_contract: true
            artifact_arch: x64
          - label: macos-universal
            runner: macos-15
            artifact: parthenon-installer-macos-universal
            smoke_contract: true
            artifact_arch: universal
            tauri_target: universal-apple-darwin
          - label: windows-x64
            runner: windows-2022
            artifact: parthenon-installer-windows-x64
            smoke_contract: false
            artifact_arch: x64

    env:
      APPLE_CERT_CONFIGURED: ${{ secrets.APPLE_CERTIFICATE != '' }}
      APPLE_API_KEY_CONFIGURED: ${{ secrets.APPLE_API_KEY != '' && (secrets.APPLE_API_ISSUER || secrets.APPLE_ISSUER_ID) != '' && secrets.APPLE_API_KEY_P8 != '' }}
      WINDOWS_SIGNING_CONFIGURED: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ACCOUNT != '' && secrets.WINDOWS_TRUSTED_SIGNING_PROFILE != '' && secrets.WINDOWS_TRUSTED_SIGNING_ENDPOINT != '' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_SECRET != '' && secrets.AZURE_TENANT_ID != '' }}
      WINDOWS_SIGNING_PARTIAL: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ACCOUNT != '' || secrets.WINDOWS_TRUSTED_SIGNING_PROFILE != '' || secrets.WINDOWS_TRUSTED_SIGNING_ENDPOINT != '' || secrets.AZURE_CLIENT_ID != '' || secrets.AZURE_CLIENT_SECRET != '' || secrets.AZURE_TENANT_ID != '' }}
      GPG_KEY_CONFIGURED: ${{ secrets.GPG_SIGNING_KEY != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets for macOS universal
        if: ${{ runner.os == 'macOS' && matrix.tauri_target == 'universal-apple-darwin' }}
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Validate macOS notarization configuration
        if: ${{ runner.os == 'macOS' && env.APPLE_CERT_CONFIGURED == 'true' }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ (secrets.APPLE_API_ISSUER || secrets.APPLE_ISSUER_ID) }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_ISSUER" ] && [ -n "$APPLE_API_KEY_P8" ]; then
            exit 0
          fi
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            exit 0
          fi
          echo "APPLE_CERTIFICATE is configured, but notarization credentials are incomplete." >&2
          echo "Provide either APPLE_API_KEY/APPLE_API_ISSUER/APPLE_API_KEY_P8 or APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID." >&2
          exit 1

      - name: Prepare macOS signing certificate
        if: ${{ runner.os == 'macOS' && env.APPLE_CERT_CONFIGURED == 'true' }}
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import "$RUNNER_TEMP/apple-certificate.p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID="$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -n 1 | awk -F'\"' '{print $2}')"
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application signing identity was not found in the imported certificate." >&2
            exit 1
          fi
          {
            echo "APPLE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID"
          } >> "$GITHUB_ENV"

      - name: Prepare App Store Connect API key
        if: ${{ runner.os == 'macOS' && env.APPLE_API_KEY_CONFIGURED == 'true' }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ (secrets.APPLE_API_ISSUER || secrets.APPLE_ISSUER_ID) }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          {
            echo "APPLE_API_KEY_PATH=$KEY_PATH"
          } >> "$GITHUB_ENV"
          echo "=== Diagnostic: verify App Store Connect API credentials ==="
          echo "Key file bytes: $(wc -c < "$KEY_PATH")"
          echo "Key file head: $(head -1 "$KEY_PATH")"
          echo "Key file tail: $(tail -1 "$KEY_PATH")"
          echo "Key ID length: ${#APPLE_API_KEY}"
          echo "Issuer ID length: ${#APPLE_API_ISSUER}"
          # Call notarytool history — any 401 surfaces Apple's real error
          xcrun notarytool history \
            --key "$KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" 2>&1 | head -20 || true
          echo "=== End diagnostic ==="

      - name: Validate Windows trusted signing configuration
        if: ${{ runner.os == 'Windows' && env.WINDOWS_SIGNING_PARTIAL == 'true' }}
        shell: pwsh
        env:
          WINDOWS_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ACCOUNT }}
          WINDOWS_TRUSTED_SIGNING_PROFILE: ${{ secrets.WINDOWS_TRUSTED_SIGNING_PROFILE }}
          WINDOWS_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          $required = @{
            WINDOWS_TRUSTED_SIGNING_ACCOUNT = $env:WINDOWS_TRUSTED_SIGNING_ACCOUNT
            WINDOWS_TRUSTED_SIGNING_PROFILE = $env:WINDOWS_TRUSTED_SIGNING_PROFILE
            WINDOWS_TRUSTED_SIGNING_ENDPOINT = $env:WINDOWS_TRUSTED_SIGNING_ENDPOINT
            AZURE_CLIENT_ID = $env:AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET = $env:AZURE_CLIENT_SECRET
            AZURE_TENANT_ID = $env:AZURE_TENANT_ID
          }
          $missing = @($required.GetEnumerator() | Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } | ForEach-Object Key)
          if ($missing.Count -gt 0) {
            throw "Windows trusted signing configuration is incomplete. Missing: $($missing -join ', ')"
          }

      - name: Install Windows trusted-signing CLI
        if: ${{ runner.os == 'Windows' && env.WINDOWS_SIGNING_CONFIGURED == 'true' }}
        shell: pwsh
        run: cargo install trusted-signing-cli --locked

      - name: Prepare Windows signing config
        if: ${{ runner.os == 'Windows' && env.WINDOWS_SIGNING_CONFIGURED == 'true' }}
        working-directory: installer/rust-gui
        shell: pwsh
        env:
          WINDOWS_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ACCOUNT }}
          WINDOWS_TRUSTED_SIGNING_PROFILE: ${{ secrets.WINDOWS_TRUSTED_SIGNING_PROFILE }}
          WINDOWS_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ENDPOINT }}
          WINDOWS_TRUSTED_SIGNING_DESCRIPTION: ${{ secrets.WINDOWS_TRUSTED_SIGNING_DESCRIPTION }}
        run: |
          $description = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TRUSTED_SIGNING_DESCRIPTION)) {
            'Parthenon Installer'
          } else {
            $env:WINDOWS_TRUSTED_SIGNING_DESCRIPTION
          }
          # Use object form for signCommand to avoid shlex::split mangling
          # Windows backslashes in %1 path substitution (Tauri v2 string-form bug).
          $config = @{
            bundle = @{
              windows = @{
                signCommand = @{
                  cmd = 'trusted-signing-cli'
                  args = @(
                    '-e', $env:WINDOWS_TRUSTED_SIGNING_ENDPOINT,
                    '-a', $env:WINDOWS_TRUSTED_SIGNING_ACCOUNT,
                    '-c', $env:WINDOWS_TRUSTED_SIGNING_PROFILE,
                    '-d', $description,
                    '%1'
                  )
                }
              }
            }
          } | ConvertTo-Json -Depth 6
          Set-Content -Path tauri.windows.conf.json -Value $config
          Write-Host "=== Generated tauri.windows.conf.json ==="
          Get-Content tauri.windows.conf.json

      - name: Diagnostic — test trusted-signing-cli on dummy file
        if: ${{ runner.os == 'Windows' && env.WINDOWS_SIGNING_CONFIGURED == 'true' }}
        working-directory: installer/rust-gui
        shell: pwsh
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          WINDOWS_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ACCOUNT }}
          WINDOWS_TRUSTED_SIGNING_PROFILE: ${{ secrets.WINDOWS_TRUSTED_SIGNING_PROFILE }}
          WINDOWS_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.WINDOWS_TRUSTED_SIGNING_ENDPOINT }}
        run: |
          # Copy a real Windows binary (signtool.exe) as a dummy target
          $dummy = "$env:TEMP\sign-test.exe"
          Copy-Item "$env:windir\System32\notepad.exe" $dummy -Force
          Write-Host "=== trusted-signing-cli --version ==="
          trusted-signing-cli --version
          Write-Host "=== trusted-signing-cli sign attempt (verbose) ==="
          $env:RUST_LOG = "debug"
          trusted-signing-cli `
            -e $env:WINDOWS_TRUSTED_SIGNING_ENDPOINT `
            -a $env:WINDOWS_TRUSTED_SIGNING_ACCOUNT `
            -c $env:WINDOWS_TRUSTED_SIGNING_PROFILE `
            -d "Diagnostic test" `
            $dummy 2>&1
          Write-Host "=== trusted-signing-cli exit code: $LASTEXITCODE ==="

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - name: Install Python contract dependencies
        run: python -m pip install --quiet rich questionary

      - name: Validate Python installer contract
        shell: bash
        run: |
          python -m py_compile install.py installer/bundle_manifest.py installer/contract.py installer/data_probe.py installer/webapp.py installer/docker_ops.py
          python -m py_compile installer/build_cosmo.py
          if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
            cp backend/.env.example backend/.env
            docker compose -f docker-compose.community.yml config >/dev/null
          else
            echo "Docker Compose not available on this runner; skipping runtime compose config validation."
          fi
          python install.py --contract validate --community --contract-redact --contract-pretty
          python install.py --contract plan --community --contract-redact --contract-pretty >/dev/null
          python install.py --contract data-check --community --contract-redact --contract-pretty >/dev/null
          python install.py --contract bundle-manifest --community --contract-redact --contract-pretty >/dev/null
          # New contract actions added in Phase 1
          python install.py --contract health --community --contract-redact --contract-pretty >/dev/null
          python install.py --contract credentials --community --contract-redact --contract-pretty >/dev/null
          python install.py --contract service-status --community --contract-redact --contract-pretty >/dev/null
          python install.py --contract open-app --community --contract-redact --contract-pretty >/dev/null
          python install.py --contract recover --community --contract-redact --contract-pretty >/dev/null
          # diagnose requires an input payload
          echo '{"_diagnose_input":{"stdout":"OSError: [Errno 98] Address already in use: (\"0.0.0.0\", 8082)","stderr":"","exit_code":1,"phase":"bootstrap","platform":"linux"}}' > /tmp/diagnose-input.json
          python install.py --contract diagnose --community --contract-input /tmp/diagnose-input.json --contract-redact --contract-pretty >/dev/null
          # port-holder requires a port input
          echo '{"_port":65535}' > /tmp/port-holder-input.json
          python install.py --contract port-holder --community --contract-input /tmp/port-holder-input.json --contract-redact --contract-pretty >/dev/null

      - name: Validate Rust GUI
        working-directory: installer/rust-gui
        shell: bash
        run: |
          cargo fmt --check
          cargo test
          if [ "${{ matrix.smoke_contract }}" = "true" ]; then
            cargo test python_contract_ -- --ignored
          fi
          cargo clippy --all-targets -- -D warnings

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build Tauri bundle
        working-directory: installer/rust-gui
        env:
          # macOS: codesign uses APPLE_CERTIFICATE + APPLE_SIGNING_IDENTITY.
          # Notarization is handled by a dedicated xcrun notarytool step below —
          # Tauri v2's built-in notarize path uses a deprecated Apple endpoint
          # that returns "Use app-specific password" 401s even with valid
          # notarytool creds. Deliberately do NOT pass APPLE_API_*, APPLE_ID,
          # APPLE_PASSWORD here, so Tauri just signs and skips notarize.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
        shell: bash
        run: |
          if [ -n "$TAURI_TARGET" ]; then
            cargo tauri build --target "$TAURI_TARGET"
            # Alias the target-qualified output so downstream path-based steps still work.
            mkdir -p target/release
            rm -rf target/release/bundle
            ln -s "$(pwd)/target/$TAURI_TARGET/release/bundle" target/release/bundle
          else
            cargo tauri build
          fi

      - name: Notarize and staple macOS .app, then rebuild + staple .dmg
        if: ${{ runner.os == 'macOS' && env.APPLE_API_KEY_CONFIGURED == 'true' }}
        working-directory: installer/rust-gui
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ (secrets.APPLE_API_ISSUER || secrets.APPLE_ISSUER_ID) }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          app_bundle="$(find target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$app_bundle" ]; then
            echo "Expected a macOS .app bundle after build, but none was found." >&2
            exit 1
          fi
          echo "Notarizing .app: $app_bundle"
          zip_path="$(mktemp -d)/app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$app_bundle" "$zip_path"
          xcrun notarytool submit "$zip_path" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$app_bundle"
          echo "Notarized and stapled .app"

          # Find the original dmg, delete it, then rebuild from the stapled .app
          original_dmg="$(find target/release/bundle/dmg -name '*.dmg' -print -quit)"
          if [ -n "$original_dmg" ]; then
            dmg_dir="$(dirname "$original_dmg")"
            dmg_name="$(basename "$original_dmg")"
            volname="${dmg_name%.dmg}"
            echo "Rebuilding $dmg_name from stapled .app to embed the staple ticket"
            rm "$original_dmg"
            staging="$(mktemp -d)/dmg-staging"
            mkdir -p "$staging"
            cp -R "$app_bundle" "$staging/"
            ln -s /Applications "$staging/Applications"
            hdiutil create -volname "$volname" -srcfolder "$staging" -ov -format UDZO "$dmg_dir/$dmg_name"
            echo "Rebuilt $dmg_name"

            echo "Notarizing rebuilt .dmg: $dmg_dir/$dmg_name"
            xcrun notarytool submit "$dmg_dir/$dmg_name" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg_dir/$dmg_name"
            echo "Notarized and stapled .dmg"
          fi

      - name: Verify macOS signature and Gatekeeper status
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        working-directory: installer/rust-gui
        shell: bash
        run: |
          app_bundle="$(find target/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$app_bundle" ]; then
            echo "Expected a macOS .app bundle after build, but none was found." >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$app_bundle"
          spctl -a -vv "$app_bundle"
          xcrun stapler validate "$app_bundle"
          dmg="$(find target/release/bundle/dmg -name '*.dmg' -print -quit)"
          if [ -n "$dmg" ]; then
            xcrun stapler validate "$dmg"
            mount_point="$(mktemp -d)/dmgcheck"
            hdiutil attach "$dmg" -mountpoint "$mount_point" -nobrowse -readonly
            mounted_app="$(find "$mount_point" -maxdepth 1 -name '*.app' -print -quit)"
            if [ -n "$mounted_app" ]; then
              xcrun stapler validate "$mounted_app"
              echo "✓ .app inside .dmg has staple ticket"
            fi
            hdiutil detach "$mount_point"
          fi

      - name: Sign Linux packages with GPG
        if: ${{ runner.os == 'Linux' && env.GPG_KEY_CONFIGURED == 'true' }}
        working-directory: installer/rust-gui
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        run: |
          echo "$GPG_SIGNING_KEY" | base64 --decode | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^fpr' | head -1 | cut -d: -f10)
          # Export public key for release distribution
          gpg --armor --export "$KEY_ID" > ../../SIGNING-KEY.asc
          echo "Exported SIGNING-KEY.asc with fingerprint $KEY_ID"
          find target/release/bundle/deb -name "*.deb" -print0 2>/dev/null | \
            while IFS= read -r -d '' pkg; do
              gpg --batch --local-user "$KEY_ID" --detach-sign --armor "$pkg"
              echo "Signed: $pkg"
            done
          find target/release/bundle/rpm -name "*.rpm" -print0 2>/dev/null | \
            while IFS= read -r -d '' pkg; do
              gpg --batch --local-user "$KEY_ID" --detach-sign --armor "$pkg"
              echo "Signed: $pkg"
            done
          find target/release/bundle/appimage -name "*.AppImage" -print0 2>/dev/null | \
            while IFS= read -r -d '' pkg; do
              gpg --batch --local-user "$KEY_ID" --detach-sign --armor "$pkg"
              echo "Signed: $pkg"
            done

      - name: List generated bundles
        working-directory: installer/rust-gui
        shell: bash
        run: find target/release/bundle -maxdepth 4 -type f -print | sort

      - name: Package Linux bundles
        if: runner.os == 'Linux'
        working-directory: installer/rust-gui
        run: |
          mkdir -p dist-artifacts
          tar -C target/release -czf "dist-artifacts/${{ matrix.artifact }}.tar.gz" bundle
          # SHA-256 sidecars
          cd dist-artifacts
          for f in *.tar.gz; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Package macOS bundles
        if: runner.os == 'macOS'
        working-directory: installer/rust-gui
        run: |
          mkdir -p dist-artifacts
          ditto -c -k --sequesterRsrc --keepParent target/release/bundle "dist-artifacts/${{ matrix.artifact }}.zip"
          cd dist-artifacts
          for f in *.zip; do
            shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Package Windows bundles
        if: runner.os == 'Windows'
        working-directory: installer/rust-gui
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Compress-Archive -Path target/release/bundle/* -DestinationPath "dist-artifacts/${{ matrix.artifact }}.zip" -Force
          Push-Location dist-artifacts
          Get-ChildItem -Filter *.zip | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            Set-Content -Path "$($_.Name).sha256" -Value "$hash *$($_.Name)"
          }
          Pop-Location

      - name: Attest build provenance (SLSA L3)
        if: ${{ github.event_name == 'release' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            installer/rust-gui/target/release/bundle/dmg/*.dmg
            installer/rust-gui/target/release/bundle/msi/*.msi
            installer/rust-gui/target/release/bundle/deb/*.deb
            installer/rust-gui/target/release/bundle/rpm/*.rpm
            installer/rust-gui/target/release/bundle/appimage/*.AppImage

      - name: Upload installer packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          compression-level: 0
          path: installer/rust-gui/dist-artifacts/*

      - name: Upload macOS release asset
        if: ${{ github.event_name == 'release' && runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != '' }}
        working-directory: installer/rust-gui
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.version' tauri.conf.json)
          ARCH=${{ matrix.artifact_arch }}
          DMG=$(find target/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "No .dmg found — skipping release upload." >&2
            exit 0
          fi
          # Per-asset sha256
          shasum -a 256 "$DMG" | awk '{print $1}' > "${DMG}.sha256"
          gh release upload "${{ github.event.release.tag_name }}" \
            "${DMG}#Parthenon-Installer-${VERSION}-macos-${ARCH}.dmg" \
            "${DMG}.sha256#Parthenon-Installer-${VERSION}-macos-${ARCH}.dmg.sha256" \
            --clobber

      - name: Upload Windows release asset
        if: ${{ github.event_name == 'release' && runner.os == 'Windows' && env.WINDOWS_SIGNING_CONFIGURED == 'true' }}
        working-directory: installer/rust-gui
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content tauri.conf.json | ConvertFrom-Json).version
          $msi = Get-ChildItem -Path "target/release/bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) {
            Write-Warning "No .msi found — skipping release upload."
            exit 0
          }
          # Per-asset sha256
          $hash = (Get-FileHash -Algorithm SHA256 $msi.FullName).Hash.ToLower()
          $sha256Path = "$($msi.FullName).sha256"
          Set-Content -Path $sha256Path -Value $hash
          gh release upload "${{ github.event.release.tag_name }}" `
            "$($msi.FullName)#Parthenon-Installer-${version}-windows-x64.msi" `
            "${sha256Path}#Parthenon-Installer-${version}-windows-x64.msi.sha256" --clobber

      - name: Upload Linux release assets
        if: ${{ github.event_name == 'release' && runner.os == 'Linux' }}
        working-directory: installer/rust-gui
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r '.version' tauri.conf.json)
          UPLOADS=()

          gen_sha256() {
            sha256sum "$1" | awk '{print $1}' > "$1.sha256"
          }

          DEB=$(find target/release/bundle/deb -name "*.deb" 2>/dev/null | head -1)
          if [ -n "$DEB" ]; then
            gen_sha256 "$DEB"
            UPLOADS+=("${DEB}#Parthenon-Installer-${VERSION}-linux-x64.deb")
            UPLOADS+=("${DEB}.sha256#Parthenon-Installer-${VERSION}-linux-x64.deb.sha256")
            [ -f "${DEB}.asc" ] && UPLOADS+=("${DEB}.asc#Parthenon-Installer-${VERSION}-linux-x64.deb.asc")
          fi

          RPM=$(find target/release/bundle/rpm -name "*.rpm" 2>/dev/null | head -1)
          if [ -n "$RPM" ]; then
            gen_sha256 "$RPM"
            UPLOADS+=("${RPM}#Parthenon-Installer-${VERSION}-linux-x64.rpm")
            UPLOADS+=("${RPM}.sha256#Parthenon-Installer-${VERSION}-linux-x64.rpm.sha256")
            [ -f "${RPM}.asc" ] && UPLOADS+=("${RPM}.asc#Parthenon-Installer-${VERSION}-linux-x64.rpm.asc")
          fi

          APPIMAGE=$(find target/release/bundle/appimage -name "*.AppImage" 2>/dev/null | head -1)
          if [ -n "$APPIMAGE" ]; then
            gen_sha256 "$APPIMAGE"
            UPLOADS+=("${APPIMAGE}#Parthenon-Installer-${VERSION}-linux-x64.AppImage")
            UPLOADS+=("${APPIMAGE}.sha256#Parthenon-Installer-${VERSION}-linux-x64.AppImage.sha256")
            [ -f "${APPIMAGE}.asc" ] && UPLOADS+=("${APPIMAGE}.asc#Parthenon-Installer-${VERSION}-linux-x64.AppImage.asc")
          fi

          [ -f "../../SIGNING-KEY.asc" ] && UPLOADS+=("../../SIGNING-KEY.asc#SIGNING-KEY.asc")

          if [ ${#UPLOADS[@]} -eq 0 ]; then
            echo "No Linux artifacts found — skipping release upload." >&2
            exit 0
          fi

          gh release upload "${{ github.event.release.tag_name }}" \
            "${UPLOADS[@]}" \
            --clobber

  publish-updater-manifest:
    name: Publish updater latest.json
    needs: [build, installer-bundle]
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'release' }}
    env:
      TAURI_UPDATER_PRIVATE_KEY_CONFIGURED: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Skip if updater key not configured
        if: ${{ env.TAURI_UPDATER_PRIVATE_KEY_CONFIGURED != 'true' }}
        run: |
          echo "TAURI_UPDATER_PRIVATE_KEY secret not set — skipping latest.json publication."
          echo "The auto-updater banner will silently no-op until the keypair is provisioned."
          echo "See docs/site/docs/install/key-rotation.mdx for the bootstrap procedure."
          exit 0

      - name: Download release artifacts
        if: ${{ env.TAURI_UPDATER_PRIVATE_KEY_CONFIGURED == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern '*.dmg' --pattern '*.msi' --pattern '*.AppImage' \
            --dir artifacts
          ls -la artifacts/

      - name: Sign artifacts and assemble latest.json
        if: ${{ env.TAURI_UPDATER_PRIVATE_KEY_CONFIGURED == 'true' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
        run: |
          set -e
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"  # strip leading v if present
          notes_url="https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Find each platform artifact and sign it
          dmg="$(find artifacts -name '*.dmg' | head -1)"
          msi="$(find artifacts -name '*.msi' | head -1)"
          appimage="$(find artifacts -name '*.AppImage' | head -1)"

          sign_artifact() {
            local artifact="$1"
            if [ -z "$artifact" ] || [ ! -f "$artifact" ]; then
              echo ""
              return
            fi
            cargo tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$artifact" >/dev/null 2>&1
            cat "${artifact}.sig" | tr -d '\n'
          }

          dmg_sig="$(sign_artifact "$dmg")"
          msi_sig="$(sign_artifact "$msi")"
          appimage_sig="$(sign_artifact "$appimage")"

          dmg_url="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/$(basename "$dmg")"
          msi_url="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/$(basename "$msi")"
          appimage_url="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/$(basename "$appimage")"

          # Assemble latest.json
          cat > latest.json <<JSON
          {
            "version": "$version",
            "notes": "$notes_url",
            "pub_date": "$pub_date",
            "platforms": {
              "darwin-x86_64":  { "signature": "$dmg_sig",      "url": "$dmg_url" },
              "darwin-aarch64": { "signature": "$dmg_sig",      "url": "$dmg_url" },
              "windows-x86_64": { "signature": "$msi_sig",      "url": "$msi_url" },
              "linux-x86_64":   { "signature": "$appimage_sig", "url": "$appimage_url" }
            }
          }
          JSON

          # Validate
          jq . latest.json >/dev/null
          cat latest.json

      - name: Upload latest.json
        if: ${{ env.TAURI_UPDATER_PRIVATE_KEY_CONFIGURED == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "latest.json" --clobber
          echo "Published latest.json to release ${{ github.event.release.tag_name }}"

  verify-release:
    name: Verify release artifacts
    needs: [build, installer-bundle, publish-updater-manifest]
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'release' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p verify
          gh release download "${{ github.event.release.tag_name }}" --dir verify
          ls -la verify/

      - name: Verify SHA-256 sidecars
        working-directory: verify
        run: |
          set -e
          for sha_file in *.sha256; do
            artifact="${sha_file%.sha256}"
            if [ ! -f "$artifact" ]; then
              echo "WARN: sidecar $sha_file has no corresponding artifact" >&2
              continue
            fi
            expected="$(awk '{print $1}' "$sha_file")"
            actual="$(sha256sum "$artifact" | awk '{print $1}')"
            if [ "$expected" = "$actual" ]; then
              echo "✓ $artifact"
            else
              echo "✗ $artifact: expected $expected, got $actual" >&2
              exit 1
            fi
          done

      - name: Verify GPG signatures (Linux artifacts)
        working-directory: verify
        run: |
          set -e
          if [ ! -f SIGNING-KEY.asc ]; then
            echo "WARN: SIGNING-KEY.asc not present in release — skipping GPG verification"
            exit 0
          fi
          gpg --import SIGNING-KEY.asc
          for asc in *.asc; do
            [ "$asc" = "SIGNING-KEY.asc" ] && continue
            artifact="${asc%.asc}"
            if [ ! -f "$artifact" ]; then
              continue
            fi
            if gpg --verify "$asc" "$artifact"; then
              echo "✓ GPG: $artifact"
            else
              echo "✗ GPG verification failed for $artifact" >&2
              exit 1
            fi
          done

      - name: Verify SLSA attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          cd verify
          for artifact in *.dmg *.msi *.deb *.rpm *.AppImage; do
            [ -f "$artifact" ] || continue
            if gh attestation verify "$artifact" --owner sudoshi; then
              echo "✓ Attestation: $artifact"
            else
              echo "✗ Attestation verification failed for $artifact" >&2
              exit 1
            fi
          done

      - name: Summary
        run: |
          echo "All cryptographic verifications passed."
          echo "Release ${{ github.event.release.tag_name }} is ready for publication."
